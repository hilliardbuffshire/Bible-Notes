function parseRef(r){const t=r.trim();for(const k of KO){if(t.startsWith(k))return K2E[k]+' '+t.slice(k.length).trim();}return t;}

async function fetchEn(ref,tr='kjv'){
  const r=await fetch(`https://bible-api.com/${encodeURIComponent(parseRef(ref))}?translation=${tr}`);
  if(!r.ok)throw new Error();return r.json();
}
async function fetchKo(ref){
  const t=ref.trim();let idx=-1;
  for(let i=0;i<KO.length;i++){if(t.startsWith(KO[i])){idx=i;break;}}
  if(idx===-1)for(let i=0;i<EN.length;i++){if(t.toLowerCase().startsWith(EN[i].toLowerCase())){idx=i;break;}}
  if(idx===-1)return'';
  const bookTxt=idx<KO.length?KO[idx]:EN[idx];
  const rest=t.slice(bookTxt.length).trim();
  const m=rest.match(/(\d+):(\d+)/);if(!m)return'';
  try{
    const r=await fetch(`https://getbible.net/v2/korean/${idx+1}/${m[1]}.json`);
    if(!r.ok)return'';
    const d=await r.json();
    return(d.verses?.[parseInt(m[2])]?.verse||d.verses?.[parseInt(m[2])]?.text||'').trim();
  }catch{return'';}
}

function bookOf(ref){if(!ref)return null;const t=ref.trim();for(const k of KO){if(t.startsWith(k))return k;}for(const e of EN){if(t.toLowerCase().startsWith(e.toLowerCase()))return e;}return null;}

function xref(note,all){
  const books=new Set(),refs=new Set();
  const scrs=parseScrs(note.mainScripture);
  scrs.forEach(s=>{const b=bookOf(s);if(b)books.add(b);refs.add(s.trim());});
  (note.verses||[]).forEach(v=>{if(v.ref){const b=bookOf(v.ref);if(b)books.add(b);refs.add(v.ref.trim());}});
  return all.filter(n=>n.id!==note.id).map(n=>{
    const s=[];const chk=r=>{if(refs.has(r.trim()))s.push(r.trim());else{const b=bookOf(r);if(b&&books.has(b)&&!s.includes(b))s.push(b);}};
    parseScrs(n.mainScripture).forEach(chk);(n.verses||[]).forEach(v=>{if(v.ref)chk(v.ref);});
    return{note:n,shared:[...new Set(s)]};
  }).filter(x=>x.shared.length>0);
}

}

function VerseItem({v,size='detail'}){
  const [ko,setKo]=useState(v.koText||'');
  const [ldKo,setLdKo]=useState(false);
  useEffect(()=>{
    if(!v.koText&&v.ref){
      setLdKo(true);
      fetchKo(v.ref).then(t=>{setKo(t);setLdKo(false);}).catch(()=>setLdKo(false));
    }
  },[v.ref,v.koText]);

// вФАвФА лЕЄнКЄ мЧРлФФнД∞ вФАвФА
function NoteEditor({initial,onSave,onCancel,dfltChurch}){
  const blank={title:'',date:new Date().toISOString().split('T')[0],church:dfltChurch||'лґАмВ∞м†ЬмЭЉкµРнЪМ',mainScripture:'',summary:'',content:'',tags:[],verses:[],youtubeUrl:''};
  const [form,setForm]=useState(initial?{...blank,...initial}:{...blank});
  const [tagIn,setTagIn]=useState('');const [scrIn,setScrIn]=useState('');
  const [addingKo,setAddingKo]=useState({});  // {id: bool} fetching status
  const [autoAddInfo,setAutoAddInfo]=useState(''); // auto-add status msg
  const deb=useRef(null);const mvIds=useRef({});
  const autoAdded=useRef(new Set(initial?(initial.verses||[]).map(v=>v.ref):[])); // мЭілѓЄ мґФк∞АлРЬ ref мґФм†Б
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const scrs=parseScrs(form.mainScripture);

  // л≥ЄлђЄ кµђм†И мґФк∞А & мЮРлПЩ fetch
  const addScr=async()=>{
    const val=scrIn.trim();if(!val||scrs.includes(val))return;
    setScrIn('');
    const newScrs=[...scrs,val];
    set('mainScripture',joinScrs(newScrs));
    // Auto-fetch EN + KO and add to citations
    const vId=uid();mvIds.current[val]=vId;
    setAddingKo(a=>({...a,[vId]:true}));
    try{
      const d=await fetchEn(val,'kjv');
      const enTxt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
      const koTxt=await fetchKo(val);
      const vData={id:vId,ref:d.reference,text:enTxt,koText:koTxt};
      setForm(f=>({...f,verses:[vData,...(f.verses||[]).filter(v=>v.id!==vId)]}));
    }catch{}
    setAddingKo(a=>{const n={...a};delete n[vId];return n;});
  };
  const rmScr=s=>{
    const id=mvIds.current[s];
    set('mainScripture',joinScrs(scrs.filter(x=>x!==s)));
    if(id)setForm(f=>({...f,verses:(f.verses||[]).filter(v=>v.id!==id)}));
  };

  // лВімЪ© нЕНмК§нКЄмЧРмДЬ [кµђм†И] лШРлКФ м±Ел™Е мЮ•:м†И нМ®нДі к∞РмІА вЖТ мЮРлПЩ мґФк∞А
  useEffect(()=>{
    clearTimeout(deb.current);
    deb.current=setTimeout(()=>{
      const found=[];
      // Pass 1: [bookname ch:vs] лМАкіДнШЄ нМ®нДі
      const re1=/\[([^\]]{3,40})\]/g;let m;
      while((m=re1.exec(form.content))!==null){
        const ref=m[1].trim();
        const ok=KO.some(k=>ref.startsWith(k))||EN.some(e=>ref.toLowerCase().startsWith(e.toLowerCase()));
        if(ok&&!autoAdded.current.has(ref)&&!found.includes(ref))found.push(ref);
      }
      // Pass 2: bookname ch:vs мІБм†С нМ®нДі (нХЬкµ≠мЦі)
      for(const k of KO){
        const re2=new RegExp(k+'\\s*(\\d+):(\\d+)','g');
        while((m=re2.exec(form.content))!==null){
          const ref=`${k} ${m[1]}:${m[2]}`;
          if(!autoAdded.current.has(ref)&&!found.includes(ref))found.push(ref);
        }
      }
      if(!found.length)return;
      setAutoAddInfo(`вП≥ ${found.length}к∞Ь кµђм†И мЮРлПЩ мґФк∞А м§С...`);
      found.forEach(async ref=>{
        autoAdded.current.add(ref);
        const vId=uid();
        try{
          const d=await fetchEn(ref,'kjv');
          const enTxt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
          const koTxt=await fetchKo(ref);
          setForm(f=>{
            if((f.verses||[]).some(v=>v.ref===d.reference||v.ref===ref))return f;
            return{...f,verses:[...(f.verses||[]),{id:vId,ref:d.reference,text:enTxt,koText:koTxt}]};
          });
        }catch{
          setForm(f=>{
            if((f.verses||[]).some(v=>v.ref===ref))return f;
            return{...f,verses:[...(f.verses||[]),{id:vId,ref,text:'',koText:''}]};
          });
        }
        setAutoAddInfo('');
      });
    },1200);
  },[form.content]);

  const addTag=()=>{const t=tagIn.trim().replace(/^#/,'');if(t&&!form.tags.includes(t))set('tags',[...form.tags,t]);setTagIn('');};
  const rmTag=t=>set('tags',form.tags.filter(x=>x!==t));
  const addVerse=v=>set('verses',[...form.verses,{...v,id:uid()}]);
  const rmVerse=id=>set('verses',form.verses.filter(v=>v.id!==id));

  const L=(label,hint)=><label style={{display:'block',fontSize:'13px',fontWeight:700,color:'var(--bm)',marginBottom:'5px'}}>{label}{hint&&<span style={{fontWeight:400,color:'#9a7a60',marginLeft:'6px',fontSize:'12px'}}>{hint}</span>}</label>;

  return<div className="fade" style={{maxWidth:'700px',margin:'0 auto'}}>
    <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'18px'}}>
      <button onClick={onCancel} style={{color:'var(--bl)',fontSize:'20px',fontWeight:700,background:'none',border:'none',cursor:'pointer'}}>вЖР</button>
      <h2 style={{fontSize:'20px',fontWeight:800,color:'var(--bd)'}}>{initial?'вЬПпЄП лЕЄнКЄ мИШм†Х':'вЬ® мГИ мД±к≤љк≥µлґА лЕЄнКЄ'}</h2>
    </div>
    <div className="card" style={{padding:'22px',display:'flex',flexDirection:'column',gap:'16px'}}>
      {/* м†Ьл™© */}
      <div>{L('м†Ьл™© *')}<input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="мД§кµР м†Ьл™© лШРлКФ мД±к≤љк≥µлґА м£Љм†Ь" style={{fontSize:'16px'}}/></div>

      {/* лВ†мІЬ + кµРнЪМ */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <div>{L('лВ†мІЬ')}<input type="date" value={form.date} onChange={e=>set('date',e.target.value)}/></div>
        <div>{L('кµРнЪМ','мД†нГЭ')}<input value={form.church} onChange={e=>set('church',e.target.value)} placeholder="кµРнЪМ мЭіл¶Д"/></div>
      </div>

      {/* л≥ЄлђЄ мД±к≤љкµђм†И вАФ л≥µмИШ мЮЕл†• */}
      <div>
        {L('л≥ЄлђЄ мД±к≤љкµђм†И','мЧђлЯђ кµђм†И мґФк∞А к∞АлК• вАФ мЮРлПЩмЬЉл°Ь мЭЄмЪ©мЧР мґФк∞АлР®')}
        <div style={{display:'flex',gap:'7px',marginBottom:'8px'}}>
          <input value={scrIn} onChange={e=>setScrIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addScr()}
            placeholder="мЪФнХЬл≥µмЭМ 3:16 мЮЕл†• нЫД Enter лШРлКФ мґФк∞А нБіл¶≠" style={{flex:1}}/>
          <button onClick={addScr} className="ba" style={{whiteSpace:'nowrap'}}>мґФк∞А</button>
        </div>
        {Object.keys(addingKo).length>0&&<div style={{fontSize:'12px',color:'var(--am)',marginBottom:'6px'}}>вП≥ кµђм†И лґИлЯђмШ§лКФ м§С...</div>}
        {scrs.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
          {scrs.map(s=><span key={s} className="schip">рЯУЬ {s}<button onClick={()=>rmScr(s)} style={{background:'none',border:'none',cursor:'pointer',marginLeft:'5px',color:'#a05030',fontSize:'15px',lineHeight:1}}>√Ч</button></span>)}
        </div>}
      </div>

      {/* YouTube */}
      <div>
        {L('мД§кµР YouTube лІБнБђ','мД†нГЭ')}
        <input value={form.youtubeUrl||''} onChange={e=>set('youtubeUrl',e.target.value)} placeholder="https://www.youtube.com/watch?v=..."/>
      </div>

      {/* лЕЄнКЄ лВімЪ© */}
      <div>
        {L('лЕЄнКЄ лВімЪ©','лВімЪ©мЧРмДЬ [мЪФнХЬл≥µмЭМ 3:16] нШХмЛЭмЬЉл°Ь мУ∞л©і мЮРлПЩмЬЉл°Ь мЭЄмЪ©мЧР мґФк∞А м†ЬмХИлР®')}
        <textarea value={form.content} onChange={e=>set('content',e.target.value)} rows={8} style={{resize:'vertical',fontSize:'15px',lineHeight:1.8}} placeholder="мД§кµР лВімЪ©, лђµмГБ, м†БмЪ©м†Р, кЄ∞лПД м†Ьл™© лУ± мЮРмЬ†л°≠к≤М...&#10;&#10;кµђм†И мЭЄмЪ© мШИ: [мЪФнХЬл≥µмЭМ 3:16] лШРлКФ [Romans 8:28]"/>
        {/* мЮРлПЩ мґФк∞А мІДнЦЙ м§С нСЬмЛЬ */}
        {autoAddInfo&&<div style={{background:'#fff8e8',border:'1px solid #fde68a',borderRadius:'8px',padding:'8px 12px',marginTop:'6px',fontSize:'13px',color:'var(--am)',fontWeight:600}}>{autoAddInfo}</div>}
      </div>

      {/* мЪФмХљ */}
      <div>{L('нХµмЛђ мЪФмХљ','лЛ§л•Є мВђлЮМлУ§мЭі л≥Љ мЪФмХљ')}<textarea value={form.summary} onChange={e=>set('summary',e.target.value)} rows={3} style={{resize:'none',fontSize:'14px'}} placeholder="мЭі лЕЄнКЄмЭШ нХµмЛђмЭД 2~3лђЄмЮ•мЬЉл°Ь мЪФмХљнХШмДЄмЪФ."/></div>

      {/* мЭЄмЪ© кµђм†И к≤АмГЙ */}
      <div>{L('мЭЄмЪ© кµђм†И мґФк∞А')}<VerseSearch onAdd={addVerse}/></div>

      {/* мЭЄмЪ© кµђм†И л™©л°Э */}
      {form.verses.length>0&&<div>
        {L(`мґФк∞АлРЬ мЭЄмЪ© кµђм†И (${form.verses.length})`)}
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {form.verses.map(v=><div key={v.id} style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>

          </div>)}
        </div>
      </div>}

      {/* нГЬкЈЄ */}
      <div>
        {L('нГЬкЈЄ')}
        <div style={{display:'flex',gap:'7px',marginBottom:'6px'}}>
          <input value={tagIn} onChange={e=>setTagIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTag()} placeholder="#мЭАнШЬ #кЄ∞лПД #мВђлЮС (Enterл°Ь мґФк∞А)" style={{flex:1}}/>
