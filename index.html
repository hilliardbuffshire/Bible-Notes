const K2E=Object.fromEntries(KO.map((k,i)=>[k,EN[i]]));
const E2K=Object.fromEntries(EN.map((e,i)=>[e,KO[i]])); // 영어→한글 역변환

const fD=s=>{if(!s)return'';const d=new Date(s);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;};
const fT=s=>{if(!s)return'';const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const decHtml=s=>{if(!s)return s;return s.replace(/&#x([0-9A-Fa-f]+);/g,(_,h)=>String.fromCharCode(parseInt(h,16))).replace(/&#(\d+);/g,(_,d)=>String.fromCharCode(+d)).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&nbsp;/g,' ');};
const parseScrs=s=>s?s.split('\n').filter(Boolean):[];
const joinScrs=a=>a.join('\n');

function parseRef(r){
  const t=r.trim();
  // 범위 지원: "잠언 1:2~10" 또는 "잠언 1:2 ~ 10" → "Proverbs 1:2-10"
  const rangeM=t.match(/^(.+\s+\d+:\d+)\s*[~～]\s*(\d+)$/);
  if(rangeM){
    const base=rangeM[1].trim(),endV=rangeM[2];
    for(const k of KO){if(base.startsWith(k))return K2E[k]+' '+base.slice(k.length).trim()+'-'+endV;}
    return base+'-'+endV;
  }
  for(const k of KO){if(t.startsWith(k))return K2E[k]+' '+t.slice(k.length).trim();}
  return t;
}

async function fetchEn(ref,tr='kjv'){
  const r=await fetch(`https://bible-api.com/${encodeURIComponent(parseRef(ref))}?translation=${tr}`);
  if(!r.ok)throw new Error();return r.json();
}
// 한국어 성경은 서버 프록시를 통해 fetch (getbible.net 브라우저 직접 호출 시 Cloudflare 차단)
async function fetchKo(ref){
  try{
    const r=await fetch(`${API}/bible/ko?ref=${encodeURIComponent(ref.trim())}`);
    if(!r.ok)return'';
    const d=await r.json();
    return d.text||'';
  }catch{return'';}
}

function bookOf(ref){if(!ref)return null;const t=ref.trim();for(const k of KO){if(t.startsWith(k))return k;}for(const e of EN){if(t.toLowerCase().startsWith(e.toLowerCase()))return e;}return null;}
function koBookOf(ref){if(!ref)return null;const t=ref.trim();for(const k of KO){if(t.startsWith(k))return k;}for(let i=0;i<EN.length;i++){if(t.toLowerCase().startsWith(EN[i].toLowerCase()))return KO[i];}return null;}

function xref(note,all){
  // 교차인용 기준: 반드시 "책명 장:절" 형식이 일치해야 함 (책명만 같은 것은 제외)
  const refs=new Set();
  const addRef=r=>{if(r&&/\d+:\d+/.test(r.trim()))refs.add(r.trim());};
  parseScrs(note.mainScripture).forEach(addRef);
  (note.verses||[]).forEach(v=>{if(v.ref)addRef(v.ref);});
  if(!refs.size)return[];
  return all.filter(n=>n.id!==note.id).map(n=>{
    const shared=[];
    const chk=r=>{const t=r.trim();if(/\d+:\d+/.test(t)&&refs.has(t)&&!shared.includes(t))shared.push(t);};
    parseScrs(n.mainScripture).forEach(chk);
    (n.verses||[]).forEach(v=>{if(v.ref)chk(v.ref);});
    return{note:n,shared:[...new Set(shared)]};
  }).filter(x=>x.shared.length>0);
}

function ytId(url){if(!url)return null;const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([^&\s]+)/);return m?m[1]:null;}

function dlCSV(notes){
  const BOM='\uFEFF',H=['제목','날짜','교회','본문구절','요약','태그','내용'];
  const esc=v=>`"${String(v||'').replace(/"/g,'""')}"`;
  const rows=notes.map(n=>[n.title,n.date,n.church,parseScrs(n.mainScripture).join(';'),n.summary,(n.tags||[]).join(';'),n.content].map(esc).join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([BOM+[H.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download='말씀노트.csv';a.click();
}
function copyGD(note){

  const lines=[`📖 ${note.title}`,'═'.repeat(40),`날짜: ${fD(note.date)}`,note.church?`교회: ${note.church}`:'',
    scrs.length?`본문: ${scrs.join(', ')}`:'',note.youtubeUrl?`YouTube: ${note.youtubeUrl}`:'',
    note.summary?`\n📝 요약\n${note.summary}`:'',note.content?`\n📋 내용\n${note.content}`:'',
    note.verses?.length?`\n📜 인용\n${note.verses.map(v=>`• ${v.ref}\n  ${v.text}${v.koText?'\n  '+v.koText:''}`).join('\n\n')}`:'',
    note.tags?.length?`\n🏷 ${note.tags.map(t=>'#'+t).join(' ')}`:''
  ].filter(Boolean).join('\n');
  navigator.clipboard?navigator.clipboard.writeText(lines).then(()=>alert('📋 복사 완료!')):
    (()=>{const ta=document.createElement('textarea');ta.value=lines;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('복사 완료!');})();
}

// ── 교차 인용 SVG 연결 지도 ──
function CrossRefGraphSvg({refKey,citingNotes}){
  const W=400,CX=200,CY=85,NR=26,SR=20,OB=74;
  const nodes=citingNotes.slice(0,8);
  const pos=nodes.map((n,i,a)=>{
    const angle=a.length===1?0:(i/a.length)*2*Math.PI-Math.PI/2;
    return{note:n,x:CX+Math.cos(angle)*OB,y:CY+Math.sin(angle)*OB};
  });
  const allY=[CY+NR,...pos.map(p=>p.y+SR+4)];
  const H=Math.max(130,Math.max(...allY)+6);
  return<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxHeight:'180px',borderRadius:'10px',background:'linear-gradient(135deg,#fffbf5,#fef3c7)',display:'block'}}>
    {pos.map(({note,x,y})=><line key={note.id} x1={CX} y1={CY} x2={x} y2={y} stroke="#d97706" strokeWidth="1.5" strokeOpacity="0.4" strokeDasharray="5 3"/>)}
    <circle cx={CX} cy={CY} r={NR} fill="#78350f"/>
    <text x={CX} y={CY-5} textAnchor="middle" fill="white" fontSize="8" fontWeight="bold" fontFamily="sans-serif">{refKey.length>9?refKey.slice(0,9)+'…':refKey}</text>
    <text x={CX} y={CY+8} textAnchor="middle" fill="#fcd34d" fontSize="9" fontFamily="sans-serif">×{nodes.length+1}</text>
    {pos.map(({note,x,y})=><g key={note.id}>
      <circle cx={x} cy={y} r={SR} fill="#fffbf5" stroke="#d97706" strokeWidth="1.5"/>
      <text x={x} y={y-3} textAnchor="middle" fill="#78350f" fontSize="6.5" fontWeight="bold" fontFamily="sans-serif">{note.title.length>8?note.title.slice(0,8)+'…':note.title}</text>
      <text x={x} y={y+8} textAnchor="middle" fill="#92400e" fontSize="6" fontFamily="sans-serif">{note.date?note.date.slice(2,7):''}</text>
    </g>)}
  </svg>;
}

// ── 교차 인용 분석 패널 ──
function CrossRefMap({note,all}){
  const [selRef,setSelRef]=useState(null);

  // 이 노트가 인용한 구절 목록 수집 (mainScripture + verses)
  const noteRefs=[...new Set([
    ...parseScrs(note.mainScripture).filter(s=>/\d+:\d+/.test(s)).map(s=>s.trim()),
    ...(note.verses||[]).filter(v=>v.ref&&/\d+:\d+/.test(v.ref)).map(v=>v.ref.trim())
  ])];

  // 구절별 인용 데이터 계산
  const refData=noteRefs.map(ref=>{
    const citing=(all||[]).filter(n=>
      n.id!==note.id&&(
        parseScrs(n.mainScripture).some(s=>s.trim()===ref)||
        (n.verses||[]).some(v=>v.ref&&v.ref.trim()===ref)
      )
    );
    const tagFreq=citing.flatMap(n=>n.tags||[]).reduce((acc,t)=>({...acc,[t]:(acc[t]||0)+1}),{});
    const maxFreq=Math.max(1,...Object.values(tagFreq));
    return{ref,citing,tagFreq,maxFreq,total:citing.length+1};
  });

  const activeRef=selRef||refData[0]?.ref;
  const sel=refData.find(d=>d.ref===activeRef)||refData[0];

  if(!noteRefs.length)return<div style={{textAlign:'center',padding:'32px',color:'#b08060'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>🔗</div><div style={{fontSize:'14px'}}>인용 구절이 없습니다</div></div>;

  return<div className="fade">
    {/* 구절 탭 */}
    {noteRefs.length>1&&<div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'16px',paddingBottom:'12px',borderBottom:'1px solid #fde68a'}}>
      {refData.map(({ref,total})=><button key={ref} onClick={()=>setSelRef(ref)} style={{padding:'5px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:700,border:'none',cursor:'pointer',background:activeRef===ref?'#78350f':'#fff3e0',color:activeRef===ref?'#fff':'#7b3f00'}}>
        {ref} <span style={{opacity:0.7}}>({total})</span>
      </button>)}
    </div>}

    {sel&&<div>
      {/* 인용 횟수 헤더 */}
      <div style={{display:'flex',alignItems:'center',gap:'16px',padding:'14px 16px',background:'linear-gradient(135deg,#fff8e8,#fef3c7)',borderRadius:'12px',marginBottom:'14px',border:'1px solid #fde68a'}}>
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:'38px',fontWeight:900,color:'#78350f',lineHeight:1}}>{sel.total}</div>
          <div style={{fontSize:'11px',color:'#92400e',fontWeight:700,marginTop:'3px'}}>노트 인용</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,color:'#78350f',fontSize:'14px',marginBottom:'8px'}}>{sel.ref}</div>
          <div style={{display:'flex',gap:'5px',flexWrap:'wrap',marginBottom:'5px'}}>
            {Array.from({length:Math.min(sel.total,14)}).map((_,i)=><div key={i} style={{width:'10px',height:'10px',borderRadius:'50%',background:i===0?'#78350f':'#f59e0b'}} title={i===0?'현재 노트':(sel.citing[i-1]?.title||'')}/>)}
            {sel.total>14&&<span style={{fontSize:'11px',color:'#92400e'}}>+{sel.total-14}</span>}
          </div>
          <div style={{fontSize:'11px',color:'#9a7a60'}}>
            {sel.citing.length>0?`현재 노트 포함 ${sel.total}개 노트에서 인용`:'현재 노트에서만 인용됨'}
          </div>
        </div>
      </div>

      {/* 큰 그림: 연결된 말씀 맥락 */}
      {sel.citing.length>0&&(()=>{
        const connRefs=[];
        sel.citing.forEach(n=>parseScrs(n.mainScripture).forEach(s=>{if(s.trim())connRefs.push({ref:s.trim(),noteId:n.id,noteTitle:n.title});}));
        const refCnt=connRefs.reduce((a,{ref})=>({...a,[ref]:(a[ref]||0)+1}),{});
        const entries=Object.entries(refCnt).sort((a,b)=>b[1]-a[1]);
        if(!entries.length)return null;
        const books=[...new Set(entries.map(([r])=>koBookOf(r)).filter(Boolean))];
        return<div style={{marginBottom:'14px'}}>
          <div style={{fontSize:'11px',fontWeight:700,color:'#9a7a60',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>🗺 큰 그림 — 이 구절이 인용된 말씀 맥락</div>
          <div style={{padding:'12px 14px',background:'linear-gradient(135deg,#fff8e8,#fff3e0)',borderRadius:'10px',border:'1px solid #fde68a'}}>
            <div style={{fontSize:'12px',color:'#7b3f00',marginBottom:'10px',fontWeight:600,lineHeight:1.5}}>
              <span style={{background:'#78350f',color:'#fff',borderRadius:'6px',padding:'2px 8px',marginRight:'6px',fontSize:'11px'}}>{sel.ref}</span>
              이 구절은 아래 말씀을 공부할 때 함께 인용됐습니다
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'8px'}}>
              {entries.map(([ref,cnt])=>{
                const book=koBookOf(ref);const sec=book?BIBLE_SECTIONS[book]:'Other';const col=SEC_COLORS[sec]||'#888';
                return<span key={ref} style={{display:'inline-flex',alignItems:'center',gap:'4px',padding:'4px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:700,background:col+'22',border:`1.5px solid ${col}66`,color:col,cursor:'default'}} title={`${cnt}개 노트에서 연결`}>
                  📖 {ref}{cnt>1&&<span style={{background:col,color:'#fff',borderRadius:'9999px',padding:'0 5px',fontSize:'10px',fontWeight:800}}>{cnt}</span>}
                </span>;
              })}
            </div>
            <div style={{fontSize:'11px',color:'#9a7a60',borderTop:'1px solid #fde68a',paddingTop:'6px'}}>
              연결된 성경책: {books.map((b,i)=>{const sec=BIBLE_SECTIONS[b]||'Other';return<span key={b} style={{color:SEC_COLORS[sec]||'#888',fontWeight:700}}>{i>0?', ':''}{b}</span>;})}
            </div>
          </div>
        </div>;
      })()}

      {/* 연관 키워드 클라우드 */}
      {Object.keys(sel.tagFreq).length>0&&<div style={{marginBottom:'14px'}}>
        <div style={{fontSize:'11px',fontWeight:700,color:'#9a7a60',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>연관 맥락 키워드</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'7px',padding:'10px 12px',background:'#fffbeb',borderRadius:'10px',border:'1px solid #fde68a'}}>
          {Object.entries(sel.tagFreq).sort((a,b)=>b[1]-a[1]).map(([tag,cnt])=>{
            const r=cnt/sel.maxFreq;
            return<span key={tag} title={`${cnt}개 노트에서 언급`} style={{padding:'4px 10px',borderRadius:'20px',fontWeight:700,cursor:'default',fontSize:`${0.65+r*0.3}rem`,background:`rgba(120,53,15,${0.07+r*0.13})`,border:`1px solid rgba(180,83,9,${0.18+r*0.28})`,color:`rgba(120,53,15,${0.55+r*0.45})`}}>
              #{tag}{cnt>1&&<span style={{opacity:0.6,fontSize:'0.8em',fontWeight:400}}>×{cnt}</span>}
            </span>;
          })}
        </div>
      </div>}

      {/* SVG 연결 지도 */}
      {sel.citing.length>0&&<div style={{marginBottom:'14px'}}>
        <div style={{fontSize:'11px',fontWeight:700,color:'#9a7a60',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>인용 연결 지도</div>
        <CrossRefGraphSvg refKey={sel.ref} citingNotes={sel.citing}/>
      </div>}

      {/* 인용 노트 목록 */}
      {sel.citing.length>0?<div>
        <div style={{fontSize:'11px',fontWeight:700,color:'#9a7a60',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>이 구절을 인용한 노트 ({sel.citing.length}개)</div>
        <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
          {sel.citing.map(n=><div key={n.id} style={{display:'flex',gap:'10px',alignItems:'flex-start',background:'linear-gradient(135deg,#fffbeb,#fff8f0)',borderRadius:'10px',padding:'11px 13px',border:'1px solid #fde68a'}}>
            <div style={{width:'3px',alignSelf:'stretch',borderRadius:'9999px',background:'linear-gradient(#f59e0b,#f97316)',flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px',marginBottom:'3px'}}>
                <div style={{fontWeight:800,fontSize:'14px',color:'#78350f'}}>{n.title}</div>
                <div style={{fontSize:'11px',color:'#92400e',background:'#fef3c7',padding:'2px 8px',borderRadius:'20px',flexShrink:0,whiteSpace:'nowrap'}}>{fD(n.date)}</div>
              </div>
              {n.mainScripture&&<div style={{fontSize:'12px',color:'#92400e',marginBottom:'5px'}}>📖 {parseScrs(n.mainScripture).join(', ')}</div>}
              <div style={{display:'flex',flexWrap:'wrap',gap:'3px'}}>
                {(n.tags||[]).map(t=><span key={t} style={{fontSize:'11px',background:'#fff',border:'1px solid #fde68a',color:'#7b3f00',borderRadius:'20px',padding:'1px 8px'}}>#{t}</span>)}
              </div>
            </div>
          </div>)}
        </div>
      </div>:<div style={{textAlign:'center',padding:'24px',background:'#f9f9f9',borderRadius:'12px'}}>
        <div style={{fontSize:'26px',marginBottom:'6px'}}>🔗</div>
        <div style={{fontSize:'13px',color:'#9a7a60'}}>다른 노트에서 아직 이 구절을 인용하지 않았습니다.</div>
        <div style={{fontSize:'11px',color:'#bfb0a0',marginTop:'3px'}}>노트가 쌓일수록 연결이 생깁니다.</div>
      </div>}
    </div>}
  </div>;
}

// ── 성경 연결 지도 (D3 Force Graph + 목록 뷰) ──
function BibleGraph({notes}){
  const svgRef=useRef(null);
  const tipRef=useRef(null);
  const [selBook,setSelBook]=useState(null);
  const [selSec,setSelSec]=useState(null);       // 섹션 필터
  const [viewMode,setViewMode]=useState('graph'); // 'graph' | 'list'
  const [expanded,setExpanded]=useState({});      // {bookName: bool}

  const {nodes,links,bNoteIds}=useMemo(()=>{
    const bCnt={},bNoteIds={};
    notes.forEach(note=>{
      const bs=new Set();
      parseScrs(note.mainScripture).forEach(s=>{const b=koBookOf(s);if(b)bs.add(b);});
      bs.forEach(b=>{bCnt[b]=(bCnt[b]||0)+1;if(!bNoteIds[b])bNoteIds[b]=[];bNoteIds[b].push(note.id);});
    });
    const eMap={};const seenPairs=new Set();
    notes.forEach(note=>{
      const linked=xref(note,notes);if(!linked.length)return;
      const ms1=new Set();
      parseScrs(note.mainScripture).forEach(s=>{const b=koBookOf(s);if(b)ms1.add(b);});
      if(!ms1.size)return;
      linked.forEach(({note:n2})=>{
        const pairKey=[note.id,n2.id].sort().join(':');
        if(seenPairs.has(pairKey))return;seenPairs.add(pairKey);
        const ms2=new Set();
        parseScrs(n2.mainScripture).forEach(s=>{const b=koBookOf(s);if(b)ms2.add(b);});
        if(!ms2.size)return;
        ms1.forEach(b1=>ms2.forEach(b2=>{if(b1!==b2){const k=[b1,b2].sort().join('||');eMap[k]=(eMap[k]||0)+1;}}));
      });
    });
    const nodes=Object.keys(bCnt).map(b=>({id:b,count:bCnt[b],section:BIBLE_SECTIONS[b]||'Other',noteIds:bNoteIds[b]||[]}));
    const links=Object.entries(eMap).map(([k,w])=>{const[s,t]=k.split('||');return{source:s,target:t,weight:w};});
    return{nodes,links,bNoteIds};
  },[notes]);

  // 섹션 필터 적용
  const visNodes=selSec?nodes.filter(n=>n.section===selSec):nodes;
  const visNodeIds=new Set(visNodes.map(n=>n.id));
  const visLinks=links.filter(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return visNodeIds.has(s)&&visNodeIds.has(t);
  });

  useEffect(()=>{
    if(viewMode!=='graph'||!svgRef.current||!visNodes.length)return;
    const el=svgRef.current;
    const W=el.clientWidth||700,H=480;
    d3.select(el).selectAll('*').remove();
    d3.select(el).attr('height',H);
    // D3 전용 툴팁 (React state 없이 직접 DOM 조작 → 리렌더링 없음)
    let tip=tipRef.current;
    if(!tip){
      tip=document.createElement('div');
      Object.assign(tip.style,{position:'absolute',pointerEvents:'none',display:'none',
        background:'rgba(30,10,0,.92)',color:'#fff',borderRadius:'10px',padding:'10px 14px',
        fontSize:'13px',zIndex:'20',minWidth:'160px',maxWidth:'240px',lineHeight:'1.5'});
      el.parentNode.appendChild(tip);
      tipRef.current=tip;
    }
    const svg=d3.select(el);const g=svg.append('g');
    svg.call(d3.zoom().scaleExtent([0.2,5]).on('zoom',e=>g.attr('transform',e.transform)));
    const maxC=Math.max(...visNodes.map(n=>n.count),1);
    const r=n=>6+Math.sqrt(n.count/maxC)*28;
    const nC=visNodes.map(n=>({...n}));
    const lC=visLinks.map(l=>({...l}));
    const sim=d3.forceSimulation(nC)
      .alphaDecay(0.05).alphaMin(0.003)
      .force('link',d3.forceLink(lC).id(d=>d.id).distance(d=>Math.max(55,95-d.weight*8)).strength(0.28))
      .force('charge',d3.forceManyBody().strength(-240))
      .force('center',d3.forceCenter(W/2,H/2))
      .force('collision',d3.forceCollide().radius(d=>r(d)+7));
    const link=g.append('g').attr('stroke-opacity',0.35).selectAll('line').data(lC).join('line')
      .attr('stroke','#c8a060').attr('stroke-width',d=>Math.min(d.weight*1.5,8));
    const node=g.append('g').selectAll('g').data(nC).join('g')
      .call(d3.drag()
        .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
        .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
        .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
    node.append('circle').attr('r',d=>r(d))
      .attr('fill',d=>SEC_COLORS[d.section]||'#888')
      .attr('stroke','#fff').attr('stroke-width',2.5).attr('opacity',0.88).style('cursor','pointer')
      .on('mouseover',(e,d)=>{
        d3.select(e.currentTarget).attr('opacity',1).attr('stroke','#fbbf24').attr('stroke-width',3.5);
        const rect=el.getBoundingClientRect();
        const nTitles=notes.filter(n=>d.noteIds.includes(n.id)).map(n=>n.title);
        const titlesHtml=nTitles.slice(0,4).map(t=>`<div style="font-size:11px;opacity:.85;padding-left:6px;border-left:2px solid #fbbf24;margin-bottom:2px">${t}</div>`).join('')
          +(nTitles.length>4?`<div style="font-size:10px;opacity:.6">+${nTitles.length-4}개 더...</div>`:'');
        tip.innerHTML=`<div style="font-weight:800;font-size:15px;margin-bottom:2px">${d.id}</div>
          <div style="opacity:.75;font-size:11px;margin-bottom:5px">${SEC_LABELS[d.section]||d.section}</div>
          <div style="color:#fbbf24;font-weight:700;${nTitles.length?'margin-bottom:6px':''}">노트 ${d.count}개에서 인용</div>${titlesHtml}`;
        const px=e.clientX-rect.left,py=e.clientY-rect.top;
        tip.style.left=Math.min(px+14,W-180)+'px';
        tip.style.top=Math.min(py+14,H-120)+'px';
        tip.style.display='block';
      })
      .on('mouseout',(e,d)=>{d3.select(e.currentTarget).attr('opacity',0.88).attr('stroke','#fff').attr('stroke-width',2.5);tip.style.display='none';})
      .on('click',(e,d)=>{tip.style.display='none';setSelBook(b=>b===d.id?null:d.id);});
    node.append('text').text(d=>d.id)
      .attr('text-anchor','middle').attr('dy','0.35em')
      .attr('font-size',d=>Math.max(8,Math.min(12,r(d)*0.6)))
      .attr('fill','#fff').attr('font-weight',700).attr('pointer-events','none');
    sim.on('tick',()=>{
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      node.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
    return()=>{sim.stop();tip.style.display='none';};
  },[visNodes,visLinks,viewMode]);

  // 목록 뷰용 데이터: 섹션 → 책 → 노트
  const listData=useMemo(()=>{
    const secMap={};
    visNodes.forEach(nd=>{
      const sec=nd.section;
      if(!secMap[sec])secMap[sec]={label:SEC_LABELS[sec]||sec,color:SEC_COLORS[sec]||'#888',books:[]};
      const bookNotes=notes.filter(n=>nd.noteIds.includes(n.id));
      // 각 노트에 대해 이 책과 교차인용된 구절 수집
      const notesWithXref=bookNotes.map(n=>{
        const sharedRefs=[];
        const xlinked=xref(n,notes);
        xlinked.forEach(({note:n2,shared})=>shared.forEach(s=>{
          if(koBookOf(s)===nd.id&&!sharedRefs.includes(s))sharedRefs.push(s);
        }));
        return{...n,xrefRefs:sharedRefs};
      });
      secMap[sec].books.push({book:nd.id,count:nd.count,notes:notesWithXref});
    });
    return Object.entries(secMap).sort((a,b)=>b[1].books.reduce((s,x)=>s+x.count,0)-a[1].books.reduce((s,x)=>s+x.count,0));
  },[visNodes,notes]);

  const toggleBook=b=>setExpanded(e=>({...e,[b]:!e[b]}));

  if(nodes.length===0)return<div className="fade" style={{textAlign:'center',padding:'60px',color:'#b08060'}}>
    <div style={{fontSize:'44px',marginBottom:'12px'}}>📖</div>
    <div style={{fontSize:'16px',fontWeight:700,marginBottom:'6px'}}>아직 인용 구절이 없습니다</div>
    <div style={{fontSize:'14px'}}>노트에 성경 구절을 추가하면 연결 지도가 만들어집니다.</div>
  </div>;

  return<div className="fade">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px',marginBottom:'12px'}}>
      <div>
        <h2 style={{fontSize:'20px',fontWeight:800,color:'var(--bd)',marginBottom:'2px'}}>🌐 성경 연결 지도</h2>
        <p style={{fontSize:'12px',color:'#9a7a60'}}>{nodes.length}개 성경책 · {notes.length}개 노트 · {links.length}개 연결</p>
      </div>
      <div style={{display:'flex',gap:'6px'}}>
        {['graph','list'].map(m=><button key={m} onClick={()=>setViewMode(m)} style={{padding:'6px 14px',borderRadius:'8px',fontSize:'13px',fontWeight:700,border:'none',cursor:'pointer',background:viewMode===m?'var(--bm)':'var(--cd)',color:viewMode===m?'#fff':'var(--wt)'}}>
          {m==='graph'?'🫧 버블맵':'📋 목록'}
        </button>)}
      </div>
    </div>

    {/* 섹션 필터 칩 */}
    <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'12px'}}>
      <button onClick={()=>setSelSec(null)} style={{padding:'3px 10px',borderRadius:'9999px',fontSize:'11px',fontWeight:700,border:`1.5px solid ${selSec?'#ccc':'var(--bm)'}`,background:selSec?'#fff':'var(--bm)',color:selSec?'#9a7a60':'#fff',cursor:'pointer'}}>
        전체
      </button>
      {Object.entries(SEC_LABELS).map(([k,v])=>{
        const active=selSec===k;
        return<button key={k} onClick={()=>setSelSec(s=>s===k?null:k)} style={{padding:'3px 10px',borderRadius:'9999px',fontSize:'11px',fontWeight:700,border:`1.5px solid ${SEC_COLORS[k]}`,background:active?SEC_COLORS[k]:'#fff',color:active?'#fff':SEC_COLORS[k],cursor:'pointer',transition:'all .15s'}}>
          {v}
        </button>;
      })}
    </div>

    {/* 버블맵 뷰 */}
    {viewMode==='graph'&&<div style={{position:'relative'}}>
      <svg ref={svgRef} style={{width:'100%',border:'1px solid var(--wb)',borderRadius:'14px',background:'#fffaf5',display:'block'}}/>
      {selBook&&<div style={{marginTop:'14px',padding:'14px',background:'#fff',border:'1px solid var(--wb)',borderRadius:'12px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
          <div style={{fontWeight:800,color:'var(--bm)',fontSize:'15px'}}>
            <span style={{background:SEC_COLORS[BIBLE_SECTIONS[selBook]||'Other'],color:'#fff',borderRadius:'6px',padding:'2px 8px',marginRight:'6px',fontSize:'12px'}}>{SEC_LABELS[BIBLE_SECTIONS[selBook]||'Other']}</span>
            📚 "{selBook}" 인용 노트 ({(bNoteIds[selBook]||[]).length}개)
          </div>
          <button onClick={()=>setSelBook(null)} style={{color:'#9a7a60',background:'none',border:'none',cursor:'pointer',fontSize:'20px'}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:'8px'}}>
          {notes.filter(n=>(bNoteIds[selBook]||[]).includes(n.id)).map(n=>{
            const xlinked=xref(n,notes);
            const sharedVia=[];
            xlinked.forEach(({shared})=>shared.forEach(s=>{if(koBookOf(s)===selBook&&!sharedVia.includes(s))sharedVia.push(s);}));
            return<div key={n.id} style={{background:'var(--cr)',border:'1px solid var(--wb)',borderRadius:'10px',padding:'12px'}}>
              <div style={{fontWeight:700,color:'var(--bd)',fontSize:'14px',marginBottom:'2px'}}>{n.title}</div>
              <div style={{fontSize:'11px',color:'#9a7a60',marginBottom:'6px'}}>{fD(n.date)}{n.church&&` · ${n.church}`}</div>
              {parseScrs(n.mainScripture).length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'3px',marginBottom:'5px'}}>
                {parseScrs(n.mainScripture).slice(0,3).map(s=><span key={s} style={{background:'#fff3e0',color:'#7b3f00',fontSize:'10px',borderRadius:'5px',padding:'1px 6px',border:'1px solid #ffd5a0'}}>📜 {s}</span>)}
              </div>}
              {sharedVia.length>0&&<div style={{fontSize:'10px',color:'var(--am)',fontWeight:700}}>🔗 교차인용: {sharedVia.join(', ')}</div>}
            </div>;
          })}
        </div>
      </div>}
    </div>}

    {/* 목록 뷰 */}
    {viewMode==='list'&&<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
      {listData.map(([secKey,{label,color,books}])=><div key={secKey} style={{border:`1.5px solid ${color}44`,borderRadius:'12px',overflow:'hidden'}}>
        {/* 섹션 헤더 */}
        <div style={{background:color,padding:'8px 14px',display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{color:'#fff',fontWeight:800,fontSize:'13px'}}>{label}</span>
          <span style={{background:'rgba(255,255,255,.25)',color:'#fff',borderRadius:'9999px',padding:'1px 8px',fontSize:'11px',fontWeight:700}}>{books.reduce((s,b)=>s+b.count,0)}개 노트</span>
          <span style={{background:'rgba(255,255,255,.25)',color:'#fff',borderRadius:'9999px',padding:'1px 8px',fontSize:'11px'}}>{books.length}개 성경책</span>
        </div>
        {/* 책 목록 */}
        <div style={{background:'#fff'}}>
          {books.sort((a,b)=>b.count-a.count).map(({book,count,notes:bNotes})=>{
            const isOpen=!!expanded[book];
            return<div key={book} style={{borderTop:`1px solid ${color}22`}}>
              {/* 책 행 */}
              <div onClick={()=>toggleBook(book)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 14px',cursor:'pointer',background:isOpen?`${color}0d`:'transparent',transition:'background .15s'}}
                onMouseEnter={e=>!isOpen&&(e.currentTarget.style.background=`${color}08`)}
                onMouseLeave={e=>!isOpen&&(e.currentTarget.style.background='transparent')}>
                <span style={{display:'inline-block',width:'10px',height:'10px',borderRadius:'50%',background:color,flexShrink:0}}/>
                <span style={{fontWeight:700,fontSize:'14px',color:'var(--bd)',flex:1}}>{book}</span>
                <span style={{fontSize:'11px',color:color,fontWeight:700,background:`${color}18`,padding:'2px 8px',borderRadius:'9999px'}}>{count}개 노트</span>
                <span style={{fontSize:'14px',color:'#9a7a60',transition:'transform .2s',transform:isOpen?'rotate(90deg)':'none'}}>›</span>
              </div>
              {/* 펼쳐진 노트 목록 */}
              {isOpen&&<div style={{padding:'0 14px 10px 14px',background:`${color}06`}}>
                {bNotes.map(n=>{
                  const xlinked=xref(n,notes);
                  const sharedRefs=[];
                  xlinked.forEach(({shared})=>shared.forEach(s=>{if(!sharedRefs.includes(s))sharedRefs.push(s);}));
                  return<div key={n.id} style={{padding:'10px 12px',background:'#fff',borderRadius:'8px',marginBottom:'6px',border:`1px solid ${color}33`}}>
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px',marginBottom:'4px'}}>
                      <div style={{fontWeight:700,fontSize:'13px',color:'var(--bd)'}}>{n.title}</div>
                      <div style={{fontSize:'10px',color:'#9a7a60',flexShrink:0,whiteSpace:'nowrap'}}>{fD(n.date)}</div>
                    </div>
                    {parseScrs(n.mainScripture).length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'3px',marginBottom:'4px'}}>
                      {parseScrs(n.mainScripture).map(s=><span key={s} style={{background:'#fff3e0',color:'#7b3f00',fontSize:'10px',borderRadius:'5px',padding:'1px 6px',border:'1px solid #ffd5a0'}}>📜 {s}</span>)}
                    </div>}
                    {n.tags?.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'3px',marginBottom:'4px'}}>
                      {n.tags.map(t=><span key={t} style={{background:`${color}18`,color:color,fontSize:'10px',borderRadius:'9999px',padding:'1px 6px'}}>#{t}</span>)}
                    </div>}
                    {sharedRefs.length>0&&<div style={{fontSize:'10px',color:'var(--am)',fontWeight:700,background:'#fff8e8',padding:'3px 8px',borderRadius:'5px',border:'1px solid #fde68a'}}>
                      🔗 교차인용: {sharedRefs.join(' · ')}
                    </div>}
                  </div>;
                })}
              </div>}
            </div>;
          })}
        </div>
      </div>)}
    </div>}
  </div>;
}

// ── 구절 아이템 (한국어 자동 fetch) ──
function VerseItem({v,size='detail'}){
  const [ko,setKo]=useState(decHtml(v.koText)||'');
  const [ldKo,setLdKo]=useState(false);
  useEffect(()=>{
    if(!v.koText&&v.ref){
      setLdKo(true);
      fetchKo(v.ref).then(t=>{setKo(decHtml(t)||'');setLdKo(false);}).catch(()=>setLdKo(false));
    }
  },[v.ref,v.koText]);
  const fs=size==='detail'?'15px':'14px';
  const fw=size==='detail'?800:700;
  const refSz=size==='detail'?'17px':'15px';
  return<div className="verse-box">
    <div style={{fontWeight:fw,color:'#7b3f00',fontSize:refSz,marginBottom:'7px'}}>📖 {v.ref}</div>
    {/* 영어 원문 */}
    <div style={{fontSize:'11px',fontWeight:700,color:'#9a7a60',textTransform:'uppercase',marginBottom:'4px',letterSpacing:'0.5px'}}>English (KJV)</div>
    <div style={{fontSize:fs,lineHeight:1.9,color:'#4a2c10',marginBottom:'10px',paddingBottom:'10px',borderBottom:'1px solid #fde68a'}}>{v.text||<span style={{color:'#ccc',fontSize:'13px'}}>—</span>}</div>
    {/* 한국어 번역 */}
    <div style={{fontSize:'11px',fontWeight:700,color:'#059669',textTransform:'uppercase',marginBottom:'4px',letterSpacing:'0.5px'}}>🇰🇷 한국어 (개역개정)</div>
    {ldKo
      ? <div style={{fontSize:'13px',color:'var(--am)'}}>불러오는 중...</div>
      : ko
        ? <div style={{fontSize:fs,color:'#065f46',lineHeight:1.9,fontWeight:500}}>{ko}</div>
        : <div style={{fontSize:'12px',color:'#9ca3af'}}>한국어 번역 없음</div>
    }
  </div>;
}

// ── 구절 검색 패널 ──
function VerseSearch({onAdd}){
  const [q,setQ]=useState('');const [tr,setTr]=useState('kjv');
  const [res,setRes]=useState(null);const [ld,setLd]=useState(false);const [err,setErr]=useState('');
  const [koTxt,setKoTxt]=useState('');const [koLd,setKoLd]=useState(false);
  const go=async()=>{
    if(!q.trim())return;setLd(true);setErr('');setRes(null);setKoTxt('');
    try{
      const d=await fetchEn(q,tr);
      const txt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
      setRes({ref:d.reference,text:txt});
      setKoLd(true);fetchKo(q).then(k=>{setKoTxt(k);setKoLd(false);}).catch(()=>setKoLd(false));
    }catch{setErr('구절을 찾을 수 없습니다. 예: "요한복음 3:16" 또는 "John 3:16"');}
    finally{setLd(false);}
  };
  return<div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'12px',padding:'14px'}}>
    <div style={{fontSize:'13px',fontWeight:700,color:'#7b3f00',marginBottom:'10px'}}>🔍 구절 직접 검색 · 추가</div>
    <div style={{display:'flex',gap:'7px',marginBottom:'8px'}}>
      <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="요한복음 3:16 또는 John 3:16" style={{flex:1}}/>
      <select value={tr} onChange={e=>setTr(e.target.value)} style={{width:'auto',minWidth:'65px'}}>{TR.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select>
      <button onClick={go} className="ba" style={{whiteSpace:'nowrap'}}>검색</button>
    </div>
    {ld&&<div style={{fontSize:'13px',color:'var(--am)'}}>검색 중...</div>}
    {err&&<div style={{fontSize:'13px',color:'#dc2626'}}>{err}</div>}
    {res&&<div style={{background:'#fff',border:'1px solid #fde68a',borderRadius:'10px',padding:'13px',marginTop:'8px'}}>
      <div style={{fontWeight:700,color:'#7b3f00',fontSize:'15px',marginBottom:'6px'}}>{res.ref}</div>
      <div style={{fontSize:'14px',lineHeight:1.8,marginBottom:'8px'}}>{res.text}</div>
      <div style={{fontSize:'12px',fontWeight:600,color:'#9a7a60',marginBottom:'4px'}}>한국어 번역 {koLd&&<span style={{color:'var(--am)'}}>불러오는 중...</span>}</div>
      <textarea value={koTxt} onChange={e=>setKoTxt(e.target.value)} rows={2} style={{resize:'none',marginBottom:'8px',fontSize:'14px'}} placeholder="한국어 번역 (자동 불러오기, 수정 가능)"/>
      <button onClick={()=>{onAdd({ref:res.ref,text:res.text,koText:koTxt});setRes(null);setQ('');setKoTxt('');}} className="ba" style={{width:'100%',fontSize:'14px'}}>+ 이 구절 인용에 추가</button>
    </div>}
  </div>;
}

// ── 노트 에디터 ──
function NoteEditor({initial,onSave,onCancel,dfltChurch}){
  const blank={title:'',date:new Date().toISOString().split('T')[0],church:dfltChurch||'부산제일교회',mainScripture:'',summary:'',content:'',tags:[],verses:[],youtubeUrl:''};
  const [form,setForm]=useState(initial?{...blank,...initial}:{...blank});
  const [tagIn,setTagIn]=useState('');const [scrIn,setScrIn]=useState('');
  const [addingKo,setAddingKo]=useState({});  // {id: bool} fetching status
  const [autoAddInfo,setAutoAddInfo]=useState(''); // auto-add status msg
  const [aiLoading,setAiLoading]=useState(false);
  const deb=useRef(null);const mvIds=useRef({});
  const autoAdded=useRef(new Set(initial?(initial.verses||[]).map(v=>v.ref):[])); // 이미 추가된 ref 추적
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const scrs=parseScrs(form.mainScripture);

  // 본문 구절 추가 & 자동 fetch
  const addScr=async()=>{
    const val=scrIn.trim();if(!val||scrs.includes(val))return;
    setScrIn('');
    const newScrs=[...scrs,val];
    set('mainScripture',joinScrs(newScrs));
    const vId=uid();mvIds.current[val]=vId;
    setAddingKo(a=>({...a,[vId]:true}));
    try{
      const d=await fetchEn(val,'kjv');
      // 범위 구절 (예: 잠언 1:2~10) → 각 절을 개별 VerseItem으로 추가
      if(d.verses&&d.verses.length>1){
        const limit=Math.min(d.verses.length,20);
        const items=await Promise.all(d.verses.slice(0,limit).map(async vObj=>{
          // book_name (언더스코어) — bible-api.com 실제 필드명
          const engB=vObj.book_name||vObj.bookname||'';
          const engIdx=EN.findIndex(e=>e.toLowerCase()===engB.toLowerCase());
          const koBook=engIdx>=0?KO[engIdx]:engB; // 한국어 책명으로 변환
          const vRef=`${koBook} ${vObj.chapter}:${vObj.verse}`;
          const koTxt=await fetchKo(vRef).catch(()=>'');
          return{id:uid(),ref:vRef,text:vObj.text.trim(),koText:koTxt};
        }));
        setForm(f=>({...f,verses:[...items,...(f.verses||[]).filter(v=>v.id!==vId)]}));
      }else{
        const enTxt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
        const koTxt=await fetchKo(val);
        // 사용자가 한국어로 입력했으면 한국어 ref 그대로 사용 (d.reference는 항상 영어로 옴)
        const koRef=KO.some(k=>val.startsWith(k))?val:d.reference;
        setForm(f=>({...f,verses:[{id:vId,ref:koRef,text:enTxt,koText:koTxt},...(f.verses||[]).filter(v=>v.id!==vId)]}));
      }
    }catch{}
    setAddingKo(a=>{const n={...a};delete n[vId];return n;});
  };
  const rmScr=s=>{
    const id=mvIds.current[s];
    set('mainScripture',joinScrs(scrs.filter(x=>x!==s)));
    if(id)setForm(f=>({...f,verses:(f.verses||[]).filter(v=>v.id!==id)}));
  };

  // 내용 텍스트에서 [구절] 또는 책명 장:절 패턴 감지 → 자동 추가
  useEffect(()=>{
    clearTimeout(deb.current);
    deb.current=setTimeout(()=>{
      const found=[];
      // Pass 1: [bookname ch:vs] 대괄호 패턴
      const re1=/\[([^\]]{3,40})\]/g;let m;
      while((m=re1.exec(form.content))!==null){
        const ref=m[1].trim();
        const ok=KO.some(k=>ref.startsWith(k))||EN.some(e=>ref.toLowerCase().startsWith(e.toLowerCase()));
        if(ok&&!autoAdded.current.has(ref)&&!found.includes(ref))found.push(ref);
      }
      // Pass 2: bookname ch:vs 직접 패턴 (한국어) — "잠언 1:2"
      for(const k of KO){
        const re2=new RegExp(k+'\\s*(\\d+):(\\d+)','g');
        while((m=re2.exec(form.content))!==null){
          const ref=`${k} ${m[1]}:${m[2]}`;
          if(!autoAdded.current.has(ref)&&!found.includes(ref))found.push(ref);
        }
      }
      // Pass 3: bookname ch:vs~vs 범위 패턴 (한국어) — "잠언 1:2~10"
      for(const k of KO){
        const re3=new RegExp(k+'\\s*(\\d+):(\\d+)\\s*[~～]\\s*(\\d+)','g');
        while((m=re3.exec(form.content))!==null){
          const ref=`${k} ${m[1]}:${m[2]}~${m[3]}`;
          // Pass2에서 잡힌 개별 절 중복 제거 (범위가 우선)
          const singles=[];for(let v=parseInt(m[2]);v<=parseInt(m[3]);v++)singles.push(`${k} ${m[1]}:${v}`);
          singles.forEach(s=>{const idx=found.indexOf(s);if(idx>-1)found.splice(idx,1);});
          if(!autoAdded.current.has(ref)&&!found.includes(ref))found.push(ref);
        }
      }
      if(!found.length)return;
      setAutoAddInfo(`⏳ ${found.length}개 구절 자동 추가 중...`);
      found.forEach(async ref=>{
        autoAdded.current.add(ref);
        const vId=uid();
        try{
          const d=await fetchEn(ref,'kjv');
          // 범위 구절 (verses가 여러 개) 처리
          if(d.verses&&d.verses.length>1){
            const limit=Math.min(d.verses.length,20);
            const items=await Promise.all(d.verses.slice(0,limit).map(async vObj=>{
              const engB=vObj.book_name||vObj.bookname||'';
              const engIdx=EN.findIndex(e=>e.toLowerCase()===engB.toLowerCase());
              const koBook=engIdx>=0?KO[engIdx]:engB;
              const vRef=`${koBook} ${vObj.chapter}:${vObj.verse}`;
              const koTxt=await fetchKo(vRef).catch(()=>'');
              return{id:uid(),ref:vRef,text:vObj.text.trim(),koText:koTxt};
            }));
            setForm(f=>{
              const existing=new Set((f.verses||[]).map(v=>v.ref));
              const newItems=items.filter(it=>!existing.has(it.ref));
              if(!newItems.length)return f;
              return{...f,verses:[...(f.verses||[]),...newItems]};
            });
          }else{
            const enTxt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
            const koTxt=await fetchKo(ref);
            // 한국어로 감지된 ref를 그대로 사용 (d.reference는 영어)
            const koRef=KO.some(k=>ref.startsWith(k))?ref:d.reference;
            setForm(f=>{
              if((f.verses||[]).some(v=>v.ref===koRef||v.ref===ref))return f;
              return{...f,verses:[...(f.verses||[]),{id:vId,ref:koRef,text:enTxt,koText:koTxt}]};
            });
          }
        }catch{
          setForm(f=>{
            if((f.verses||[]).some(v=>v.ref===ref))return f;
            return{...f,verses:[...(f.verses||[]),{id:vId,ref,text:'',koText:''}]};
          });
        }
        setAutoAddInfo('');
      });
    },1200);
  },[form.content]);

  const addTag=()=>{
    const parts=tagIn.split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
    if(!parts.length)return;
    const newTags=[...form.tags];
    parts.forEach(t=>{if(t&&!newTags.includes(t))newTags.push(t);});
    set('tags',newTags);setTagIn('');
  };
  const rmTag=t=>set('tags',form.tags.filter(x=>x!==t));
  const addVerse=v=>set('verses',[...form.verses,{...v,id:uid()}]);
  const rmVerse=id=>set('verses',form.verses.filter(v=>v.id!==id));

  const L=(label,hint)=><label style={{display:'block',fontSize:'13px',fontWeight:700,color:'var(--bm)',marginBottom:'5px'}}>{label}{hint&&<span style={{fontWeight:400,color:'#9a7a60',marginLeft:'6px',fontSize:'12px'}}>{hint}</span>}</label>;

  return<div className="fade" style={{maxWidth:'700px',margin:'0 auto'}}>
    <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'18px'}}>
      <button onClick={onCancel} style={{color:'var(--bl)',fontSize:'20px',fontWeight:700,background:'none',border:'none',cursor:'pointer'}}>←</button>
      <h2 style={{fontSize:'20px',fontWeight:800,color:'var(--bd)'}}>{initial?'✏️ 노트 수정':'✨ 새 성경공부 노트'}</h2>
    </div>
    <div className="card" style={{padding:'22px',display:'flex',flexDirection:'column',gap:'16px'}}>
      {/* 제목 */}
      <div>{L('제목 *')}<input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="설교 제목 또는 성경공부 주제" style={{fontSize:'16px'}}/></div>

      {/* 날짜 + 교회 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <div>{L('날짜')}<input type="date" value={form.date} onChange={e=>set('date',e.target.value)}/></div>
        <div>{L('교회','선택')}<input value={form.church} onChange={e=>set('church',e.target.value)} placeholder="교회 이름"/></div>
      </div>

      {/* 본문 성경구절 — 복수 입력 */}
      <div>
        {L('본문 성경구절','단일: 요한복음 3:16 / 범위: 잠언 1:2~10 — Enter 또는 추가 클릭')}
        <div style={{display:'flex',gap:'7px',marginBottom:'8px'}}>
          <input value={scrIn} onChange={e=>setScrIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addScr()}
            placeholder="예: 요한복음 3:16 또는 잠언 1:2~10 (범위)" style={{flex:1}}/>
          <button onClick={addScr} className="ba" style={{whiteSpace:'nowrap'}}>추가</button>
        </div>
        {Object.keys(addingKo).length>0&&<div style={{fontSize:'12px',color:'var(--am)',marginBottom:'6px'}}>⏳ 구절 불러오는 중...</div>}
        {scrs.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
          {scrs.map(s=><span key={s} className="schip">📜 {s}<button onClick={()=>rmScr(s)} style={{background:'none',border:'none',cursor:'pointer',marginLeft:'5px',color:'#a05030',fontSize:'15px',lineHeight:1}}>×</button></span>)}
        </div>}
      </div>

      {/* YouTube */}
      <div>
        {L('설교 YouTube 링크','선택')}
        <input value={form.youtubeUrl||''} onChange={e=>set('youtubeUrl',e.target.value)} placeholder="https://www.youtube.com/watch?v=..."/>
      </div>

      {/* 노트 내용 */}
      <div>
        {L('노트 내용','[요한복음 3:16] 또는 [잠언 1:2~10] 처럼 대괄호로 쓰면 자동 인용 추가')}
        <textarea value={form.content} onChange={e=>set('content',e.target.value)} rows={8} style={{resize:'vertical',fontSize:'15px',lineHeight:1.8}} placeholder="설교 내용, 묵상, 적용점, 기도 제목 등 자유롭게...&#10;&#10;구절 인용 예: [요한복음 3:16] 또는 [Romans 8:28]"/>
        {/* 자동 추가 진행 중 표시 */}
        {autoAddInfo&&<div style={{background:'#fff8e8',border:'1px solid #fde68a',borderRadius:'8px',padding:'8px 12px',marginTop:'6px',fontSize:'13px',color:'var(--am)',fontWeight:600}}>{autoAddInfo}</div>}
      </div>

      {/* 요약 + AI 요약 버튼 */}
      <div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'5px'}}>
          <label style={{fontSize:'13px',fontWeight:700,color:'var(--bm)'}}>핵심 요약 <span style={{fontWeight:400,color:'#9a7a60',fontSize:'12px'}}>다른 사람들이 볼 요약</span></label>
          <button disabled={aiLoading} onClick={async()=>{
            if(!form.content.trim()&&!form.title.trim()){alert('먼저 노트 내용을 입력해주세요.');return;}
            setAiLoading(true);
            try{
              const r=await fetch(`${API}/ai/summarize`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:form.content,title:form.title,mainScripture:form.mainScripture})});
              const d=await r.json();
              if(d.summary)set('summary',d.summary);
              else alert(d.error||'요약 생성에 실패했습니다.');
            }catch(e){alert('AI 요약 오류: '+e.message);}
            setAiLoading(false);
          }} style={{background:aiLoading?'#bbb':'linear-gradient(135deg,#7c3aed,#5b21b6)',color:'#fff',border:'none',borderRadius:'8px',padding:'5px 12px',fontSize:'12px',fontWeight:700,cursor:aiLoading?'not-allowed':'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'4px',transition:'background .2s'}}>
            {aiLoading?'⏳ 생성 중...':'✨ AI 요약'}
          </button>
        </div>
        <textarea value={form.summary} onChange={e=>set('summary',e.target.value)} rows={3} style={{resize:'none',fontSize:'14px'}} placeholder="이 노트의 핵심을 2~3문장으로 요약하세요. 또는 위의 ✨ AI 요약 버튼을 클릭해보세요!"/>
      </div>

      {/* 인용 구절 검색 */}
      <div>{L('인용 구절 추가')}<VerseSearch onAdd={addVerse}/></div>

      {/* 인용 구절 목록 */}
      {form.verses.length>0&&<div>
        {L(`추가된 인용 구절 (${form.verses.length})`)}
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {form.verses.map(v=><div key={v.id} style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
            <div style={{flex:1}}><VerseItem v={v} size="editor"/></div>
            <button onClick={()=>rmVerse(v.id)} style={{color:'#ef4444',fontSize:'20px',lineHeight:1,background:'none',border:'none',cursor:'pointer',paddingTop:'14px'}}>×</button>
          </div>)}
        </div>
      </div>}

      {/* 태그 */}
      <div>
        {L('태그')}
        <div style={{display:'flex',gap:'7px',marginBottom:'6px'}}>
          <input value={tagIn} onChange={e=>{
            const val=e.target.value;
            if(val.includes(',')){
              const parts=val.split(',');
              const toAdd=parts.slice(0,-1).map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
              if(toAdd.length){const newTags=[...form.tags];toAdd.forEach(t=>{if(t&&!newTags.includes(t))newTags.push(t);});set('tags',newTags);}
              setTagIn(parts[parts.length-1]);
            }else{setTagIn(val);}
          }} onKeyDown={e=>e.key==='Enter'&&addTag()} placeholder="사랑, 기도, 은혜 (콤마 또는 Enter로 즉시 추가)" style={{flex:1}}/>
          <button onClick={addTag} className="bg">추가</button>
        </div>
        <div>{form.tags.map(t=><span key={t} className="tag" style={{cursor:'pointer'}} onClick={()=>rmTag(t)}>#{t} ×</span>)}</div>
      </div>

      {/* 저장 */}
      <div style={{display:'flex',gap:'10px'}}>
        <button onClick={()=>{if(!form.title.trim()){alert('제목을 입력해주세요.');return;}onSave(form);}} className="bp" style={{flex:1,padding:'13px',fontSize:'16px',borderRadius:'12px'}}>
          💾 {initial?'수정 저장':'노트 저장'}
        </button>
        <button onClick={onCancel} className="bg" style={{padding:'13px 20px',borderRadius:'12px',fontSize:'15px'}}>취소</button>
      </div>
    </div>
  </div>;
}

function NoteDetail({note,all,onEdit,onClose,onDelete}){
  const [tab,setTab]=useState('content');

  const vid=ytId(note.youtubeUrl);

  return<div className="fade" style={{maxWidth:'700px',margin:'0 auto'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px',flexWrap:'wrap',gap:'8px'}}>

      <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
        {[['📋 복사',()=>copyGD(note),'#eff6ff','#1e40af'],['🖨 인쇄',()=>printN(note),'#f0fdf4','#166534'],['✏️ 수정',()=>onEdit(note),'var(--cd)','var(--wt)'],['🗑 삭제',()=>{if(confirm('삭제?'))onDelete(note.id);},'#fef2f2','#dc2626']].map(([l,fn,bg,c])=><button key={l} onClick={fn} style={{background:bg,color:c,borderRadius:'8px',padding:'7px 13px',fontSize:'13px',fontWeight:600,border:'none',cursor:'pointer'}}>{l}</button>)}

        {scrs.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'6px'}}>

        </div>
      </div>
      <div style={{display:'flex',overflowX:'auto',borderBottom:'1px solid var(--wb)',background:'var(--cr)'}}>
        {Tab('content','📝 내용')}
        {Tab('verses',`📜 구절${note.verses?.length?` (${note.verses.length})`:''}`)}
        {Tab('xref',`🔗 교차인용${linked.length?` (${linked.length})`:''}`)}
      </div>
      <div style={{padding:'22px'}}>
        {tab==='content'&&<div>

            <div style={{fontSize:'12px',fontWeight:700,color:'#7b3f00',textTransform:'uppercase',marginBottom:'8px'}}>설교 영상</div>

            </div>
          </div>}
          {note.summary&&<div style={{marginBottom:'16px'}}>
            <div style={{fontSize:'12px',fontWeight:700,color:'#7b3f00',textTransform:'uppercase',marginBottom:'6px'}}>핵심 요약</div>
            <div className="vp" style={{borderRadius:'10px',padding:'13px 16px',lineHeight:1.9,whiteSpace:'pre-wrap',fontSize:'15px'}}>{note.summary}</div>
          </div>}
          {note.content&&<div style={{marginBottom:'16px'}}>
            <div style={{fontSize:'12px',fontWeight:700,color:'#7b3f00',textTransform:'uppercase',marginBottom:'6px'}}>노트 내용</div>
            <div style={{lineHeight:1.9,whiteSpace:'pre-wrap',fontSize:'15px'}}>{note.content}</div>
          </div>}
          <div style={{display:'flex',alignItems:'center',gap:'16px',paddingTop:'12px',borderTop:'1px solid var(--wb)'}}>
            <span style={{fontSize:'13px',color:'#9a7a60'}}>👁 {note.views||0}회 조회</span>
            <span style={{fontSize:'13px',color:'#9a7a60'}}>📜 구절 {note.verses?.length||0}개</span>
            {linked.length>0&&<span style={{fontSize:'13px',color:'var(--am)',fontWeight:600}}>🔗 {linked.length}개 연결</span>}
          </div>
        </div>}
        {tab==='verses'&&(note.verses?.length?
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            {note.verses.map((v,i)=><VerseItem key={v.id||i} v={v} size="detail"/>)}

        )}

      </div>
    </div>
  </div>;
}

function App(){
  const [notes,setNotes]=useState([]);
  const [view,setView]=useState('list');
  const [sel,setSel]=useState(null);const [editT,setEditT]=useState(null);
  const [q,setQ]=useState('');const [svr,setSvr]=useState(null);const [ld,setLd]=useState(true);
  const [expOpen,setExpOpen]=useState(false);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [statsModal,setStatsModal]=useState(null); // null | 'verses' | 'xrefs'
  const [dfltChurch,setDfltChurch]=useState('부산제일교회');
  const [churchInput,setChurchInput]=useState('부산제일교회');

  useEffect(()=>{
    fetch(API+'/health').then(r=>r.ok?setSvr(true):setSvr(false)).catch(()=>setSvr(false));
    setLd(true);apiG('/notes').then(d=>setNotes(d)).catch(()=>setNotes(INIT)).finally(()=>setLd(false));
    // 설정 불러오기
    apiG('/settings').then(s=>{if(s.defaultChurch){setDfltChurch(s.defaultChurch);setChurchInput(s.defaultChurch);}}).catch(()=>{});
  },[]);

  const saveSettings=async()=>{
    const val=churchInput.trim()||'부산제일교회';
    setDfltChurch(val);
    try{await fetch(API+'/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({defaultChurch:val})});}catch{}
    setSettingsOpen(false);
  };

  const saveNote=async form=>{
    try{
      if(editT){const u=await apiU(`/notes/${editT.id}`,form);setNotes(ns=>ns.map(n=>n.id===editT.id?u:n));}
      else{const c=await apiP('/notes',{...form,id:uid(),likes:0,views:0,comments:[]});setNotes(ns=>[c,...ns]);}
    }catch{
      if(editT)setNotes(ns=>ns.map(n=>n.id===editT.id?{...n,...form}:n));
      else setNotes(ns=>[{...form,id:uid(),likes:0,views:0,comments:[]},...ns]);
    }
    setView('list');setEditT(null);
  };
  const delNote=async id=>{try{await apiD(`/notes/${id}`);}catch{}setNotes(ns=>ns.filter(n=>n.id!==id));setView('list');setSel(null);};
  const openNote=n=>{
    const u={...n,views:(n.views||0)+1};setSel(u);setNotes(ns=>ns.map(x=>x.id===n.id?u:x));
    apiU(`/notes/${n.id}`,u).catch(()=>{});setView('detail');
  };

  const filtered=notes.filter(n=>{
    if(!q.trim())return true;const s=q.toLowerCase();
    return[n.title,n.content,n.mainScripture,n.summary,n.church,...(n.tags||[])].some(x=>x?.toLowerCase().includes(s));
  }).sort((a,b)=>{const da=a.date?new Date(a.date).getTime():0;const db=b.date?new Date(b.date).getTime():0;return db-da;});

  const dlExcel=()=>{
    if(svr){window.location.href=API+'/export/excel';}
    else{alert('Excel 내보내기는 서버 연결 시 사용 가능합니다.\n현재 오프라인 모드에서는 CSV로 내보내기 하세요.');}
  };

  return<div style={{minHeight:'100vh',background:'var(--cr)'}}>

      <div style={{maxWidth:'900px',margin:'0 auto',padding:'11px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:'9px',cursor:'pointer'}} onClick={()=>{setView('list');setSel(null);setEditT(null);}}>
          <div style={{width:'34px',height:'34px',background:'rgba(255,255,255,.2)',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}}>📖</div>
          <div>
            <div style={{fontWeight:800,color:'#fff',fontSize:'15px'}}>말씀 노트</div>
            <div style={{fontSize:'10px',color:'rgba(255,255,255,.65)',display:'flex',alignItems:'center'}}>
              <span style={{display:'inline-block',width:'6px',height:'6px',borderRadius:'50%',background:svr===true?'#4ade80':svr===false?'#f87171':'#fbbf24',marginRight:'4px'}}></span>
              {svr===true?'서버 연결됨':svr===false?'오프라인 모드':'연결 확인 중'}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
          <button onClick={()=>{setChurchInput(dfltChurch);setSettingsOpen(true);}} style={{color:'rgba(255,255,255,.7)',fontSize:'13px',padding:'7px 10px',borderRadius:'8px',background:'rgba(255,255,255,.12)',border:'none',cursor:'pointer'}} title="설정">⚙️</button>
          <button onClick={()=>setView(view==='graph'?'list':'graph')} style={{color:'rgba(255,255,255,.85)',fontSize:'13px',fontWeight:600,padding:'7px 12px',borderRadius:'8px',background:view==='graph'?'rgba(255,255,255,.35)':'rgba(255,255,255,.15)',border:'none',cursor:'pointer',whiteSpace:'nowrap'}}>🌐 연결 지도</button>
          {(view==='list'||view==='graph')&&<><button onClick={()=>setExpOpen(true)} style={{color:'rgba(255,255,255,.8)',fontSize:'13px',fontWeight:600,padding:'7px 12px',borderRadius:'8px',background:'rgba(255,255,255,.15)',border:'none',cursor:'pointer'}}>📤 내보내기</button>
          <button onClick={()=>{setEditT(null);setView('editor');}} style={{background:'var(--am)',color:'#fff',fontWeight:700,padding:'8px 15px',borderRadius:'9px',fontSize:'13px',border:'none',cursor:'pointer'}}>+ 새 노트</button></>}
        </div>
      </div>

    <main style={{maxWidth:'900px',margin:'0 auto',padding:'18px 14px'}}>
      {view==='list'&&<div className="fade">
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 제목, 본문구절, 태그, 내용으로 검색..." style={{marginBottom:'16px',fontSize:'15px'}}/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'16px'}}>
          {[

            {ic:'📜',lb:'인용 구절',v:notes.reduce((s,n)=>s+(n.verses?.length||0),0),click:'verses'},
            {ic:'🔗',lb:'교차 인용',v:notes.filter(n=>xref(n,notes).length>0).length,click:'xrefs'}
          ].map(({ic,lb,v,click})=>(
            <div key={lb} onClick={click?()=>setStatsModal(click):undefined}

              onMouseEnter={click?e=>{e.currentTarget.style.boxShadow='0 4px 16px rgba(200,120,10,.18)';e.currentTarget.style.transform='translateY(-2px)';}:undefined}
              onMouseLeave={click?e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='none';}:undefined}>
              <div style={{fontSize:'24px',marginBottom:'4px'}}>{ic}</div>
              <div style={{fontSize:'22px',fontWeight:800,color:'var(--bm)'}}>{v}</div>
              <div style={{fontSize:'13px',color:'#9a7a60'}}>{lb}</div>
              {click&&<div style={{fontSize:'11px',color:'var(--am)',marginTop:'3px',fontWeight:600}}>클릭하여 보기 →</div>}
            </div>
          ))}
        </div>
        {ld?<div style={{textAlign:'center',padding:'60px',color:'var(--am)',fontSize:'15px'}}>

        </div>:filtered.length===0?<div style={{textAlign:'center',padding:'60px',color:'#b08060'}}>
          <div style={{fontSize:'44px',marginBottom:'12px'}}>{q?'🔍':'📝'}</div>
          <div style={{fontSize:'17px',fontWeight:700,marginBottom:'6px'}}>{q?'검색 결과 없음':'아직 노트가 없습니다'}</div>
          <div style={{fontSize:'14px',marginBottom:'22px'}}>{q?'다른 키워드로 검색해보세요':'첫 번째 말씀 노트를 작성해보세요!'}</div>
          {!q&&<button onClick={()=>{setEditT(null);setView('editor');}} className="bp" style={{padding:'12px 28px',borderRadius:'12px',fontSize:'15px'}}>+ 첫 노트 작성하기</button>}
        </div>:(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'13px'}}>
            {filtered.map(n=><NoteCard key={n.id} note={n} all={notes} onClick={()=>openNote(n)}/>)}
          </div>
        )}
      </div>}

      {view==='graph'&&<BibleGraph notes={notes}/>}
      {view==='editor'&&<NoteEditor initial={editT} onSave={saveNote} onCancel={()=>{setView(sel&&editT?'detail':'list');setEditT(null);}} dfltChurch={dfltChurch}/>}
      {view==='detail'&&sel&&<NoteDetail
        note={notes.find(n=>n.id===sel.id)||sel} all={notes}
        onEdit={n=>{setEditT(n);setView('editor');}}
        onClose={()=>{setView('list');setSel(null);}}
        onDelete={delNote}/>}
    </main>

    {/* 설정 모달 */}
    {settingsOpen&&<div className="mo" onClick={()=>setSettingsOpen(false)}>
      <div className="mb" style={{maxWidth:'400px'}} onClick={e=>e.stopPropagation()}>

          <h3 style={{fontSize:'17px',fontWeight:800,color:'var(--bd)'}}>⚙️ 설정</h3>
          <button onClick={()=>setSettingsOpen(false)} style={{fontSize:'22px',color:'#9a7a60',background:'none',border:'none',cursor:'pointer'}}>×</button>
        </div>
        <div style={{marginBottom:'16px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:700,color:'var(--bm)',marginBottom:'6px'}}>기본 교회명</label>
          <input value={churchInput} onChange={e=>setChurchInput(e.target.value)} placeholder="부산제일교회" style={{fontSize:'15px'}}/>
          <div style={{fontSize:'12px',color:'#9a7a60',marginTop:'5px'}}>새 노트 작성 시 자동으로 입력됩니다. 개별 노트에서 수정 가능합니다.</div>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={saveSettings} className="bp" style={{flex:1,padding:'11px'}}>저장</button>
          <button onClick={()=>setSettingsOpen(false)} className="bg" style={{padding:'11px 18px'}}>취소</button>
        </div>
      </div>
    </div>}

    {/* 인용 구절 모달 */}
    {statsModal==='verses'&&<div className="mo" onClick={()=>setStatsModal(null)}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
          <h3 style={{fontSize:'17px',fontWeight:800,color:'var(--bd)'}}>📜 전체 인용 구절 ({notes.reduce((s,n)=>s+(n.verses?.length||0),0)}개)</h3>
          <button onClick={()=>setStatsModal(null)} style={{fontSize:'24px',color:'#9a7a60',background:'none',border:'none',cursor:'pointer'}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px',maxHeight:'60vh',overflowY:'auto'}}>
          {notes.filter(n=>n.verses?.length>0).map(n=>(
            <div key={n.id} style={{background:'var(--cr)',border:'1px solid var(--wb)',borderRadius:'10px',padding:'13px'}}>
              <div style={{fontWeight:700,color:'var(--bd)',fontSize:'14px',marginBottom:'8px'}}>📖 {n.title} <span style={{fontWeight:400,color:'#9a7a60',fontSize:'12px'}}>{fD(n.date)}</span></div>
              <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                {(n.verses||[]).map((v,i)=>(
                  <div key={v.id||i} style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'8px',padding:'9px 12px'}}>
                    <div style={{fontWeight:700,color:'#7b3f00',fontSize:'13px',marginBottom:'3px'}}>📖 {v.ref}</div>
                    {v.text&&<div style={{fontSize:'13px',color:'#4a2c10',lineHeight:1.7,marginBottom:v.koText?'5px':0}}>{v.text}</div>}
                    {v.koText&&<div style={{fontSize:'13px',color:'#065f46',lineHeight:1.7,borderTop:'1px solid #d1fae5',paddingTop:'5px'}}>{v.koText}</div>}
                  </div>
                ))}
              </div>
            </div>
          ))}
          {notes.every(n=>!n.verses?.length)&&<div style={{textAlign:'center',padding:'40px',color:'#b08060',fontSize:'14px'}}>인용된 구절이 없습니다.</div>}
        </div>
      </div>
    </div>}

    {/* 교차 인용 모달 */}
    {statsModal==='xrefs'&&<div className="mo" onClick={()=>setStatsModal(null)}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
          <h3 style={{fontSize:'17px',fontWeight:800,color:'var(--bd)'}}>🔗 교차 인용 노트 ({notes.filter(n=>xref(n,notes).length>0).length}개)</h3>
          <button onClick={()=>setStatsModal(null)} style={{fontSize:'24px',color:'#9a7a60',background:'none',border:'none',cursor:'pointer'}}>×</button>
        </div>
        <div style={{fontSize:'12px',color:'#9a7a60',marginBottom:'12px',background:'#fffbeb',borderRadius:'8px',padding:'8px 12px',border:'1px solid #fde68a'}}>
          💡 교차 인용 기준: 서로 다른 노트에서 동일한 "책 장:절"(예: 요한복음 3:16)이 인용된 경우
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px',maxHeight:'60vh',overflowY:'auto'}}>
          {notes.filter(n=>xref(n,notes).length>0).map(n=>{
            const linked=xref(n,notes);
            return<div key={n.id} style={{background:'var(--cr)',border:'1px solid var(--wb)',borderRadius:'10px',padding:'13px'}}>
              <div style={{fontWeight:800,color:'var(--bd)',fontSize:'14px',marginBottom:'8px'}}>📖 {n.title}</div>
              <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                {linked.map(({note:ln,shared})=>(
                  <div key={ln.id} style={{background:'#fff3e0',border:'1px solid #ffd5a0',borderRadius:'8px',padding:'9px 12px'}}>
                    <div style={{fontWeight:700,color:'var(--bm)',fontSize:'13px',marginBottom:'4px'}}>🔗 {ln.title}</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                      {shared.map(s=><span key={s} style={{background:'#fff',color:'#7b3f00',fontSize:'12px',borderRadius:'9999px',padding:'2px 9px',border:'1px solid #ffd5a0',fontWeight:600}}>📜 {s}</span>)}
                    </div>
                  </div>
                ))}
              </div>
            </div>;
          })}
          {notes.every(n=>xref(n,notes).length===0)&&<div style={{textAlign:'center',padding:'40px',color:'#b08060',fontSize:'14px'}}>교차 인용된 노트가 없습니다.</div>}
        </div>
      </div>
    </div>}

    {expOpen&&<div className="mo" onClick={()=>setExpOpen(false)}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
          <h3 style={{fontSize:'17px',fontWeight:800,color:'var(--bd)'}}>📤 내보내기</h3>
          <button onClick={()=>setExpOpen(false)} style={{fontSize:'24px',color:'#9a7a60',background:'none',border:'none',cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {/* Excel */}
          <button onClick={()=>{dlExcel();setExpOpen(false);}} style={{background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:'12px',padding:'14px',textAlign:'left',cursor:'pointer'}}>
            <div style={{fontWeight:700,color:'#166534',fontSize:'15px'}}>📊 Excel (.xlsx) 내보내기</div>
            <div style={{fontSize:'13px',color:'#15803d',marginTop:'4px'}}>색상·칸 꾸밈 포함, 성경책별 필터링 가능 (서버 필요)</div>
          </button>
          {/* CSV */}
          <button onClick={()=>{dlCSV(notes);setExpOpen(false);}} style={{background:'#f0fdf4',border:'2px solid #d1fae5',borderRadius:'12px',padding:'13px',textAlign:'left',cursor:'pointer'}}>
            <div style={{fontWeight:700,color:'#166534',fontSize:'14px'}}>📄 CSV 내보내기 (오프라인도 가능)</div>
          </button>
          {/* Google Docs */}
          <div style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'12px',padding:'13px'}}>
            <div style={{fontWeight:700,color:'#1e40af',fontSize:'15px',marginBottom:'3px'}}>📋 Google Docs 복사</div>
            <div style={{fontSize:'13px',color:'#1d4ed8',marginBottom:'8px'}}>복사 후 Google Docs에 Ctrl+V</div>
            <div style={{maxHeight:'130px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'5px'}}>
              {notes.map(n=><button key={n.id} onClick={()=>{copyGD(n);setExpOpen(false);}} style={{textAlign:'left',background:'#fff',border:'1px solid #bfdbfe',borderRadius:'7px',padding:'7px 11px',cursor:'pointer',fontSize:'13px',color:'#1e40af'}}>📄 {n.title}</button>)}
            </div>
          </div>
          {/* 인쇄 */}
          <div style={{background:'#fffbeb',border:'2px solid #fde68a',borderRadius:'12px',padding:'13px'}}>
            <div style={{fontWeight:700,color:'#7b3f00',fontSize:'15px',marginBottom:'6px'}}>🖨 인쇄</div>
            <div style={{maxHeight:'130px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'5px'}}>
              {notes.map(n=><button key={n.id} onClick={()=>{printN(n);setExpOpen(false);}} style={{textAlign:'left',background:'#fff',border:'1px solid #fde68a',borderRadius:'7px',padding:'7px 11px',cursor:'pointer',fontSize:'13px',color:'#7b3f00'}}>🖨 {n.title}</button>)}
            </div>
          </div>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
