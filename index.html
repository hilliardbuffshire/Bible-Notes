<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>말씀 노트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>
<style>
:root{--bd:#7b4b2a;--bm:#a0632f;--bl:#c28050;--am:#c8780a;--al:#fbbf24;--cr:#fdf6ee;--cd:#f5e6d3;--wb:#e2cdb8;--wt:#3a1e08}
body{font-family:'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--cr);color:var(--wt)}
input,textarea,select{font-family:inherit;background:#fff;border:1.5px solid var(--wb);border-radius:10px;padding:9px 13px;width:100%;color:var(--wt);transition:border .2s;font-size:14px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--am);box-shadow:0 0 0 3px rgba(200,120,10,.15)}
.card{background:#fff;border-radius:14px;border:1px solid var(--wb);transition:all .2s}
.card:hover{box-shadow:0 6px 20px rgba(100,50,10,.12);transform:translateY(-2px)}
.bp{background:var(--bm);color:#fff;border-radius:10px;font-weight:700;padding:9px 18px;border:none;cursor:pointer;transition:background .2s}
.bp:hover{background:var(--bd)}.ba{background:var(--am);color:#fff;border-radius:8px;font-weight:600;padding:7px 14px;border:none;cursor:pointer;transition:background .2s}
.ba:hover{background:#a05e08}.bg{background:var(--cd);color:var(--wt);border-radius:8px;font-weight:600;padding:7px 14px;border:none;cursor:pointer}
.bg:hover{background:var(--wb)}.tag{display:inline-block;background:#fff3e0;color:#7b3f00;border-radius:9999px;padding:2px 11px;font-size:13px;margin:2px;border:1px solid #ffd5a0}
.schip{display:inline-flex;align-items:center;background:#fff3e0;color:#7b3f00;border-radius:8px;padding:5px 10px;font-size:13px;margin:3px;border:1px solid #ffd5a0;font-weight:600}
.xref-line{width:2px;height:14px;background:linear-gradient(var(--am),var(--al));margin:0 auto}
.vp{background:linear-gradient(135deg,#fff8e8,#fef3c7);border-left:3px solid var(--am)}
.fade{animation:fi .3s ease}@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.tab-a{border-bottom:2.5px solid var(--am);color:var(--bm);font-weight:700;background:#fff}
.tab-i{color:#9a7a60}.tab-i:hover{color:var(--wt)}
.mo{position:fixed;inset:0;background:rgba(30,10,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.mb{background:#fff;border-radius:16px;width:92%;max-width:660px;max-height:90vh;overflow-y:auto;padding:26px;border:1px solid var(--wb)}
.verse-box{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px}
@media print{.np{display:none!important}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const KO=['창세기','출애굽기','레위기','민수기','신명기','여호수아','사사기','룻기','사무엘상','사무엘하','열왕기상','열왕기하','역대상','역대하','에스라','느헤미야','에스더','욥기','시편','잠언','전도서','아가','이사야','예레미야','예레미야애가','에스겔','다니엘','호세아','요엘','아모스','오바댜','요나','미가','나훔','하박국','스바냐','학개','스가랴','말라기','마태복음','마가복음','누가복음','요한복음','사도행전','로마서','고린도전서','고린도후서','갈라디아서','에베소서','빌립보서','골로새서','데살로니가전서','데살로니가후서','디모데전서','디모데후서','디도서','빌레몬서','히브리서','야고보서','베드로전서','베드로후서','요한일서','요한이서','요한삼서','유다서','요한계시록'];
const EN=['Genesis','Exodus','Leviticus','Numbers','Deuteronomy','Joshua','Judges','Ruth','1 Samuel','2 Samuel','1 Kings','2 Kings','1 Chronicles','2 Chronicles','Ezra','Nehemiah','Esther','Job','Psalms','Proverbs','Ecclesiastes','Song of Solomon','Isaiah','Jeremiah','Lamentations','Ezekiel','Daniel','Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah','Haggai','Zechariah','Malachi','Matthew','Mark','Luke','John','Acts','Romans','1 Corinthians','2 Corinthians','Galatians','Ephesians','Philippians','Colossians','1 Thessalonians','2 Thessalonians','1 Timothy','2 Timothy','Titus','Philemon','Hebrews','James','1 Peter','2 Peter','1 John','2 John','3 John','Jude','Revelation'];
const K2E=Object.fromEntries(KO.map((k,i)=>[k,EN[i]]));
const TR=[{id:'kjv',label:'KJV'},{id:'web',label:'WEB'},{id:'bbe',label:'BBE'}];
const API='/api';

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fD=s=>{if(!s)return'';const d=new Date(s);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;};
const fT=s=>{if(!s)return'';const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const parseScrs=s=>s?s.split('\n').filter(Boolean):[];
const joinScrs=a=>a.join('\n');

function parseRef(r){const t=r.trim();for(const k of KO){if(t.startsWith(k))return K2E[k]+' '+t.slice(k.length).trim();}return t;}

async function fetchEn(ref,tr='kjv'){
  const r=await fetch(`https://bible-api.com/${encodeURIComponent(parseRef(ref))}?translation=${tr}`);
  if(!r.ok)throw new Error();return r.json();
}
// 한국어 성경은 서버 프록시를 통해 fetch (getbible.net 브라우저 직접 호출 시 Cloudflare 차단)
async function fetchKo(ref){
  try{
    const r=await fetch(`${API}/bible/ko?ref=${encodeURIComponent(ref.trim())}`);
    if(!r.ok)return'';
    const d=await r.json();
    return d.text||'';
  }catch{return'';}
}

function bookOf(ref){if(!ref)return null;const t=ref.trim();for(const k of KO){if(t.startsWith(k))return k;}for(const e of EN){if(t.toLowerCase().startsWith(e.toLowerCase()))return e;}return null;}

function xref(note,all){
  const books=new Set(),refs=new Set();
  const scrs=parseScrs(note.mainScripture);
  scrs.forEach(s=>{const b=bookOf(s);if(b)books.add(b);refs.add(s.trim());});
  (note.verses||[]).forEach(v=>{if(v.ref){const b=bookOf(v.ref);if(b)books.add(b);refs.add(v.ref.trim());}});
  return all.filter(n=>n.id!==note.id).map(n=>{
    const s=[];const chk=r=>{if(refs.has(r.trim()))s.push(r.trim());else{const b=bookOf(r);if(b&&books.has(b)&&!s.includes(b))s.push(b);}};
    parseScrs(n.mainScripture).forEach(chk);(n.verses||[]).forEach(v=>{if(v.ref)chk(v.ref);});
    return{note:n,shared:[...new Set(s)]};
  }).filter(x=>x.shared.length>0);
}

function ytId(url){if(!url)return null;const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([^&\s]+)/);return m?m[1]:null;}

function dlCSV(notes){
  const BOM='\uFEFF',H=['제목','날짜','교회','본문구절','요약','태그','내용'];
  const esc=v=>`"${String(v||'').replace(/"/g,'""')}"`;
  const rows=notes.map(n=>[n.title,n.date,n.church,parseScrs(n.mainScripture).join(';'),n.summary,(n.tags||[]).join(';'),n.content].map(esc).join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([BOM+[H.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download='말씀노트.csv';a.click();
}
function copyGD(note){
  const scrs=parseScrs(note.mainScripture);
  const lines=[`📖 ${note.title}`,'═'.repeat(40),`날짜: ${fD(note.date)}`,note.church?`교회: ${note.church}`:'',
    scrs.length?`본문: ${scrs.join(', ')}`:'',note.youtubeUrl?`YouTube: ${note.youtubeUrl}`:'',
    note.summary?`\n📝 요약\n${note.summary}`:'',note.content?`\n📋 내용\n${note.content}`:'',
    note.verses?.length?`\n📜 인용\n${note.verses.map(v=>`• ${v.ref}\n  ${v.text}${v.koText?'\n  '+v.koText:''}`).join('\n\n')}`:'',
    note.tags?.length?`\n🏷 ${note.tags.map(t=>'#'+t).join(' ')}`:''
  ].filter(Boolean).join('\n');
  navigator.clipboard?navigator.clipboard.writeText(lines).then(()=>alert('📋 복사 완료!')):
    (()=>{const ta=document.createElement('textarea');ta.value=lines;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('복사 완료!');})();
}
function printN(note){
  const scrs=parseScrs(note.mainScripture);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${note.title}</title>
  <style>body{font-family:'Malgun Gothic',sans-serif;max-width:780px;margin:36px auto;padding:0 28px;color:#2d1505;line-height:1.9}
  h1{font-size:22px;color:#5c3317;border-bottom:3px solid #c8780a;padding-bottom:9px;margin-bottom:14px}
  .meta{color:#7c5a3e;font-size:13px;margin-bottom:18px}.s{margin:15px 0}
  .st{font-weight:700;color:#7b3f00;font-size:12px;text-transform:uppercase;margin-bottom:5px}
  .sb{background:#fffbeb;border-left:4px solid #c8780a;padding:11px 15px;border-radius:4px}
  .vi{background:#fff8e8;border-left:3px solid #f59e0b;padding:10px 13px;margin:7px 0;border-radius:4px}
  .vr{font-weight:700;color:#7b3f00;font-size:14px}.vt{font-size:14px;line-height:1.8;margin-top:4px}
  .kt{color:#059669;font-size:14px;margin-top:5px;padding-top:5px;border-top:1px solid #d1fae5;line-height:1.8}
  .tg{display:inline-block;background:#fff3e0;color:#7b3f00;border-radius:9999px;padding:2px 9px;font-size:12px;margin:2px;border:1px solid #ffd5a0}
  @media print{body{margin:18px}}</style></head><body>
  <h1>📖 ${note.title}</h1>
  <div class="meta">📅 ${fD(note.date)}${note.church?` · ⛪ ${note.church}`:''}${scrs.length?` · 📜 ${scrs.join(', ')}`:''}</div>
  ${note.youtubeUrl?`<div class="s"><div class="st">설교 영상</div><a href="${note.youtubeUrl}" style="color:#1d4ed8">${note.youtubeUrl}</a></div>`:''}
  ${note.summary?`<div class="s"><div class="st">핵심 요약</div><div class="sb">${note.summary.replace(/\n/g,'<br>')}</div></div>`:''}
  ${note.content?`<div class="s"><div class="st">노트 내용</div><p style="white-space:pre-wrap;font-size:14px">${note.content}</p></div>`:''}
  ${note.verses?.length?`<div class="s"><div class="st">인용 구절</div>${note.verses.map(v=>`<div class="vi"><div class="vr">📖 ${v.ref}</div><div class="vt">${v.text}</div>${v.koText?`<div class="kt">${v.koText}</div>`:''}</div>`).join('')}</div>`:''}
  ${note.tags?.length?`<div class="s"><div class="st">태그</div>${note.tags.map(t=>`<span class="tg">#${t}</span>`).join('')}</div>`:''}
  <script>setTimeout(()=>window.print(),500);<\/script></body></html>`);
  w.document.close();w.focus();
}

async function apiG(p){const r=await fetch(API+p);if(!r.ok)throw Error();return r.json();}
async function apiP(p,b){const r=await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok)throw Error();return r.json();}
async function apiU(p,b){const r=await fetch(API+p,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok)throw Error();return r.json();}
async function apiD(p){const r=await fetch(API+p,{method:'DELETE'});if(!r.ok)throw Error();return r.json();}

// ── 교차 인용 ──
function CrossRefMap({note,all}){
  const linked=xref(note,all);
  if(!linked.length)return<div style={{textAlign:'center',padding:'32px',color:'#b08060'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>🔗</div><div style={{fontSize:'14px'}}>교차 인용된 노트 없음</div></div>;
  return<div className="fade"><div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
    <div style={{background:'var(--bm)',color:'#fff',borderRadius:'12px',padding:'8px 18px',fontSize:'14px',fontWeight:700,maxWidth:'260px',textAlign:'center'}}>📖 {note.title}</div>
    <div className="xref-line"/><div style={{fontSize:'12px',color:'var(--am)',fontWeight:600,marginBottom:'2px'}}>교차 인용 {linked.length}개</div><div className="xref-line" style={{marginBottom:'10px'}}/>
    <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:'10px',width:'100%'}}>
      {linked.map(({note:n,shared})=>(
        <div key={n.id} style={{border:'1px solid #fde68a',background:'#fffbeb',borderRadius:'10px',padding:'10px 14px',maxWidth:'260px',width:'100%'}}>
          <div style={{fontWeight:700,color:'var(--bm)',fontSize:'14px',marginBottom:'3px'}}>📄 {n.title}</div>
          <div style={{fontSize:'12px',color:'#9a7a60',marginBottom:'6px'}}>{fD(n.date)}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>{shared.map(s=><span key={s} style={{background:'#fff3d6',color:'#7b3f00',fontSize:'12px',borderRadius:'9999px',padding:'2px 9px'}}>🔖 {s}</span>)}</div>
        </div>
      ))}
    </div>
  </div></div>;
}

// ── 구절 아이템 (한국어 자동 fetch) ──
function VerseItem({v,size='detail'}){
  const [ko,setKo]=useState(v.koText||'');
  const [ldKo,setLdKo]=useState(false);
  useEffect(()=>{
    if(!v.koText&&v.ref){
      setLdKo(true);
      fetchKo(v.ref).then(t=>{setKo(t);setLdKo(false);}).catch(()=>setLdKo(false));
    }
  },[v.ref,v.koText]);
  const fs=size==='detail'?'15px':'14px';
  const fw=size==='detail'?800:700;
  const refSz=size==='detail'?'17px':'15px';
  return<div className="verse-box">
    <div style={{fontWeight:fw,color:'#7b3f00',fontSize:refSz,marginBottom:'7px'}}>📖 {v.ref}</div>
    {/* 영어 원문 */}
    <div style={{fontSize:'11px',fontWeight:700,color:'#9a7a60',textTransform:'uppercase',marginBottom:'4px',letterSpacing:'0.5px'}}>English (KJV)</div>
    <div style={{fontSize:fs,lineHeight:1.9,color:'#4a2c10',marginBottom:'10px',paddingBottom:'10px',borderBottom:'1px solid #fde68a'}}>{v.text||<span style={{color:'#ccc',fontSize:'13px'}}>—</span>}</div>
    {/* 한국어 번역 */}
    <div style={{fontSize:'11px',fontWeight:700,color:'#059669',textTransform:'uppercase',marginBottom:'4px',letterSpacing:'0.5px'}}>🇰🇷 한국어 (개역개정)</div>
    {ldKo
      ? <div style={{fontSize:'13px',color:'var(--am)'}}>불러오는 중...</div>
      : ko
        ? <div style={{fontSize:fs,color:'#065f46',lineHeight:1.9,fontWeight:500}}>{ko}</div>
        : <div style={{fontSize:'12px',color:'#9ca3af'}}>한국어 번역 없음</div>
    }
  </div>;
}

// ── 구절 검색 패널 ──
function VerseSearch({onAdd}){
  const [q,setQ]=useState('');const [tr,setTr]=useState('kjv');
  const [res,setRes]=useState(null);const [ld,setLd]=useState(false);const [err,setErr]=useState('');
  const [koTxt,setKoTxt]=useState('');const [koLd,setKoLd]=useState(false);
  const go=async()=>{
    if(!q.trim())return;setLd(true);setErr('');setRes(null);setKoTxt('');
    try{
      const d=await fetchEn(q,tr);
      const txt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
      setRes({ref:d.reference,text:txt});
      setKoLd(true);fetchKo(q).then(k=>{setKoTxt(k);setKoLd(false);}).catch(()=>setKoLd(false));
    }catch{setErr('구절을 찾을 수 없습니다. 예: "요한복음 3:16" 또는 "John 3:16"');}
    finally{setLd(false);}
  };
  return<div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'12px',padding:'14px'}}>
    <div style={{fontSize:'13px',fontWeight:700,color:'#7b3f00',marginBottom:'10px'}}>🔍 구절 직접 검색 · 추가</div>
    <div style={{display:'flex',gap:'7px',marginBottom:'8px'}}>
      <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="요한복음 3:16 또는 John 3:16" style={{flex:1}}/>
      <select value={tr} onChange={e=>setTr(e.target.value)} style={{width:'auto',minWidth:'65px'}}>{TR.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select>
      <button onClick={go} className="ba" style={{whiteSpace:'nowrap'}}>검색</button>
    </div>
    {ld&&<div style={{fontSize:'13px',color:'var(--am)'}}>검색 중...</div>}
    {err&&<div style={{fontSize:'13px',color:'#dc2626'}}>{err}</div>}
    {res&&<div style={{background:'#fff',border:'1px solid #fde68a',borderRadius:'10px',padding:'13px',marginTop:'8px'}}>
      <div style={{fontWeight:700,color:'#7b3f00',fontSize:'15px',marginBottom:'6px'}}>{res.ref}</div>
      <div style={{fontSize:'14px',lineHeight:1.8,marginBottom:'8px'}}>{res.text}</div>
      <div style={{fontSize:'12px',fontWeight:600,color:'#9a7a60',marginBottom:'4px'}}>한국어 번역 {koLd&&<span style={{color:'var(--am)'}}>불러오는 중...</span>}</div>
      <textarea value={koTxt} onChange={e=>setKoTxt(e.target.value)} rows={2} style={{resize:'none',marginBottom:'8px',fontSize:'14px'}} placeholder="한국어 번역 (자동 불러오기, 수정 가능)"/>
      <button onClick={()=>{onAdd({ref:res.ref,text:res.text,koText:koTxt});setRes(null);setQ('');setKoTxt('');}} className="ba" style={{width:'100%',fontSize:'14px'}}>+ 이 구절 인용에 추가</button>
    </div>}
  </div>;
}

// ── 노트 에디터 ──
function NoteEditor({initial,onSave,onCancel,dfltChurch}){
  const blank={title:'',date:new Date().toISOString().split('T')[0],church:dfltChurch||'부산제일교회',mainScripture:'',summary:'',content:'',tags:[],verses:[],youtubeUrl:''};
  const [form,setForm]=useState(initial?{...blank,...initial}:{...blank});
  const [tagIn,setTagIn]=useState('');const [scrIn,setScrIn]=useState('');
  const [addingKo,setAddingKo]=useState({});  // {id: bool} fetching status
  const [autoAddInfo,setAutoAddInfo]=useState(''); // auto-add status msg
  const [aiLoading,setAiLoading]=useState(false);
  const deb=useRef(null);const mvIds=useRef({});
  const autoAdded=useRef(new Set(initial?(initial.verses||[]).map(v=>v.ref):[])); // 이미 추가된 ref 추적
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const scrs=parseScrs(form.mainScripture);

  // 본문 구절 추가 & 자동 fetch
  const addScr=async()=>{
    const val=scrIn.trim();if(!val||scrs.includes(val))return;
    setScrIn('');
    const newScrs=[...scrs,val];
    set('mainScripture',joinScrs(newScrs));
    // Auto-fetch EN + KO and add to citations
    const vId=uid();mvIds.current[val]=vId;
    setAddingKo(a=>({...a,[vId]:true}));
    try{
      const d=await fetchEn(val,'kjv');
      const enTxt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
      const koTxt=await fetchKo(val);
      const vData={id:vId,ref:d.reference,text:enTxt,koText:koTxt};
      setForm(f=>({...f,verses:[vData,...(f.verses||[]).filter(v=>v.id!==vId)]}));
    }catch{}
    setAddingKo(a=>{const n={...a};delete n[vId];return n;});
  };
  const rmScr=s=>{
    const id=mvIds.current[s];
    set('mainScripture',joinScrs(scrs.filter(x=>x!==s)));
    if(id)setForm(f=>({...f,verses:(f.verses||[]).filter(v=>v.id!==id)}));
  };

  // 내용 텍스트에서 [구절] 또는 책명 장:절 패턴 감지 → 자동 추가
  useEffect(()=>{
    clearTimeout(deb.current);
    deb.current=setTimeout(()=>{
      const found=[];
      // Pass 1: [bookname ch:vs] 대괄호 패턴
      const re1=/\[([^\]]{3,40})\]/g;let m;
      while((m=re1.exec(form.content))!==null){
        const ref=m[1].trim();
        const ok=KO.some(k=>ref.startsWith(k))||EN.some(e=>ref.toLowerCase().startsWith(e.toLowerCase()));
        if(ok&&!autoAdded.current.has(ref)&&!found.includes(ref))found.push(ref);
      }
      // Pass 2: bookname ch:vs 직접 패턴 (한국어)
      for(const k of KO){
        const re2=new RegExp(k+'\\s*(\\d+):(\\d+)','g');
        while((m=re2.exec(form.content))!==null){
          const ref=`${k} ${m[1]}:${m[2]}`;
          if(!autoAdded.current.has(ref)&&!found.includes(ref))found.push(ref);
        }
      }
      if(!found.length)return;
      setAutoAddInfo(`⏳ ${found.length}개 구절 자동 추가 중...`);
      found.forEach(async ref=>{
        autoAdded.current.add(ref);
        const vId=uid();
        try{
          const d=await fetchEn(ref,'kjv');
          const enTxt=(d.verses?d.verses.map(v=>v.text.trim()).join(' '):d.text||'').trim();
          const koTxt=await fetchKo(ref);
          setForm(f=>{
            if((f.verses||[]).some(v=>v.ref===d.reference||v.ref===ref))return f;
            return{...f,verses:[...(f.verses||[]),{id:vId,ref:d.reference,text:enTxt,koText:koTxt}]};
          });
        }catch{
          setForm(f=>{
            if((f.verses||[]).some(v=>v.ref===ref))return f;
            return{...f,verses:[...(f.verses||[]),{id:vId,ref,text:'',koText:''}]};
          });
        }
        setAutoAddInfo('');
      });
    },1200);
  },[form.content]);

  const addTag=()=>{
    const parts=tagIn.split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
    if(!parts.length)return;
    const newTags=[...form.tags];
    parts.forEach(t=>{if(t&&!newTags.includes(t))newTags.push(t);});
    set('tags',newTags);setTagIn('');
  };
  const rmTag=t=>set('tags',form.tags.filter(x=>x!==t));
  const addVerse=v=>set('verses',[...form.verses,{...v,id:uid()}]);
  const rmVerse=id=>set('verses',form.verses.filter(v=>v.id!==id));

  const L=(label,hint)=><label style={{display:'block',fontSize:'13px',fontWeight:700,color:'var(--bm)',marginBottom:'5px'}}>{label}{hint&&<span style={{fontWeight:400,color:'#9a7a60',marginLeft:'6px',fontSize:'12px'}}>{hint}</span>}</label>;

  return<div className="fade" style={{maxWidth:'700px',margin:'0 auto'}}>
    <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'18px'}}>
      <button onClick={onCancel} style={{color:'var(--bl)',fontSize:'20px',fontWeight:700,background:'none',border:'none',cursor:'pointer'}}>←</button>
      <h2 style={{fontSize:'20px',fontWeight:800,color:'var(--bd)'}}>{initial?'✏️ 노트 수정':'✨ 새 성경공부 노트'}</h2>
    </div>
    <div className="card" style={{padding:'22px',display:'flex',flexDirection:'column',gap:'16px'}}>
      {/* 제목 */}
      <div>{L('제목 *')}<input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="설교 제목 또는 성경공부 주제" style={{fontSize:'16px'}}/></div>

      {/* 날짜 + 교회 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <div>{L('날짜')}<input type="date" value={form.date} onChange={e=>set('date',e.target.value)}/></div>
        <div>{L('교회','선택')}<input value={form.church} onChange={e=>set('church',e.target.value)} placeholder="교회 이름"/></div>
      </div>

      {/* 본문 성경구절 — 복수 입력 */}
      <div>
        {L('본문 성경구절','여러 구절 추가 가능 — 자동으로 인용에 추가됨')}
        <div style={{display:'flex',gap:'7px',marginBottom:'8px'}}>
          <input value={scrIn} onChange={e=>setScrIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addScr()}
            placeholder="요한복음 3:16 입력 후 Enter 또는 추가 클릭" style={{flex:1}}/>
          <button onClick={addScr} className="ba" style={{whiteSpace:'nowrap'}}>추가</button>
        </div>
        {Object.keys(addingKo).length>0&&<div style={{fontSize:'12px',color:'var(--am)',marginBottom:'6px'}}>⏳ 구절 불러오는 중...</div>}
        {scrs.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
          {scrs.map(s=><span key={s} className="schip">📜 {s}<button onClick={()=>rmScr(s)} style={{background:'none',border:'none',cursor:'pointer',marginLeft:'5px',color:'#a05030',fontSize:'15px',lineHeight:1}}>×</button></span>)}
        </div>}
      </div>

      {/* YouTube */}
      <div>
        {L('설교 YouTube 링크','선택')}
        <input value={form.youtubeUrl||''} onChange={e=>set('youtubeUrl',e.target.value)} placeholder="https://www.youtube.com/watch?v=..."/>
      </div>

      {/* 노트 내용 */}
      <div>
        {L('노트 내용','내용에서 [요한복음 3:16] 형식으로 쓰면 자동으로 인용에 추가 제안됨')}
        <textarea value={form.content} onChange={e=>set('content',e.target.value)} rows={8} style={{resize:'vertical',fontSize:'15px',lineHeight:1.8}} placeholder="설교 내용, 묵상, 적용점, 기도 제목 등 자유롭게...&#10;&#10;구절 인용 예: [요한복음 3:16] 또는 [Romans 8:28]"/>
        {/* 자동 추가 진행 중 표시 */}
        {autoAddInfo&&<div style={{background:'#fff8e8',border:'1px solid #fde68a',borderRadius:'8px',padding:'8px 12px',marginTop:'6px',fontSize:'13px',color:'var(--am)',fontWeight:600}}>{autoAddInfo}</div>}
      </div>

      {/* 요약 + AI 요약 버튼 */}
      <div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'5px'}}>
          <label style={{fontSize:'13px',fontWeight:700,color:'var(--bm)'}}>핵심 요약 <span style={{fontWeight:400,color:'#9a7a60',fontSize:'12px'}}>다른 사람들이 볼 요약</span></label>
          <button disabled={aiLoading} onClick={async()=>{
            if(!form.content.trim()&&!form.title.trim()){alert('먼저 노트 내용을 입력해주세요.');return;}
            setAiLoading(true);
            try{
              const r=await fetch(`${API}/ai/summarize`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:form.content,title:form.title,mainScripture:form.mainScripture})});
              const d=await r.json();
              if(d.summary)set('summary',d.summary);
              else alert(d.error||'요약 생성에 실패했습니다.');
            }catch(e){alert('AI 요약 오류: '+e.message);}
            setAiLoading(false);
          }} style={{background:aiLoading?'#bbb':'linear-gradient(135deg,#7c3aed,#5b21b6)',color:'#fff',border:'none',borderRadius:'8px',padding:'5px 12px',fontSize:'12px',fontWeight:700,cursor:aiLoading?'not-allowed':'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'4px',transition:'background .2s'}}>
            {aiLoading?'⏳ 생성 중...':'✨ AI 요약'}
          </button>
        </div>
        <textarea value={form.summary} onChange={e=>set('summary',e.target.value)} rows={3} style={{resize:'none',fontSize:'14px'}} placeholder="이 노트의 핵심을 2~3문장으로 요약하세요. 또는 위의 ✨ AI 요약 버튼을 클릭해보세요!"/>
      </div>

      {/* 인용 구절 검색 */}
      <div>{L('인용 구절 추가')}<VerseSearch onAdd={addVerse}/></div>

      {/* 인용 구절 목록 */}
      {form.verses.length>0&&<div>
        {L(`추가된 인용 구절 (${form.verses.length})`)}
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {form.verses.map(v=><div key={v.id} style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
            <div style={{flex:1}}><VerseItem v={v} size="editor"/></div>
            <button onClick={()=>rmVerse(v.id)} style={{color:'#ef4444',fontSize:'20px',lineHeight:1,background:'none',border:'none',cursor:'pointer',paddingTop:'14px'}}>×</button>
          </div>)}
        </div>
      </div>}

      {/* 태그 */}
      <div>
        {L('태그')}
        <div style={{display:'flex',gap:'7px',marginBottom:'6px'}}>
          <input value={tagIn} onChange={e=>{
            const val=e.target.value;
            if(val.includes(',')){
              const parts=val.split(',');
              const toAdd=parts.slice(0,-1).map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
              if(toAdd.length){const newTags=[...form.tags];toAdd.forEach(t=>{if(t&&!newTags.includes(t))newTags.push(t);});set('tags',newTags);}
              setTagIn(parts[parts.length-1]);
            }else{setTagIn(val);}
          }} onKeyDown={e=>e.key==='Enter'&&addTag()} placeholder="사랑, 기도, 은혜 (콤마 또는 Enter로 즉시 추가)" style={{flex:1}}/>
          <button onClick={addTag} className="bg">추가</button>
        </div>
        <div>{form.tags.map(t=><span key={t} className="tag" style={{cursor:'pointer'}} onClick={()=>rmTag(t)}>#{t} ×</span>)}</div>
      </div>

      {/* 저장 */}
      <div style={{display:'flex',gap:'10px'}}>
        <button onClick={()=>{if(!form.title.trim()){alert('제목을 입력해주세요.');return;}onSave(form);}} className="bp" style={{flex:1,padding:'13px',fontSize:'16px',borderRadius:'12px'}}>
          💾 {initial?'수정 저장':'노트 저장'}
        </button>
        <button onClick={onCancel} className="bg" style={{padding:'13px 20px',borderRadius:'12px',fontSize:'15px'}}>취소</button>
      </div>
    </div>
  </div>;
}

function NoteDetail({note,all,onEdit,onClose,onLike,onComment,onDelete}){
  const [cmt,setCmt]=useState('');const [auth,setAuth]=useState('');const [tab,setTab]=useState('content');
  const linked=xref(note,all);
  const scrs=parseScrs(note.mainScripture);
  const vid=ytId(note.youtubeUrl);
  const submitCmt=()=>{if(!cmt.trim())return;onComment(note.id,{author:auth||'익명',text:cmt,ts:new Date().toISOString()});setCmt('');setAuth('');};
  const Tab=(k,lbl)=><button key={k} onClick={()=>setTab(k)} className={tab===k?'tab-a':'tab-i'} style={{padding:'11px 15px',fontSize:'13px',whiteSpace:'nowrap',border:'none',cursor:'pointer',background:tab===k?'#fff':'transparent'}}>{lbl}</button>;
  return<div className="fade" style={{maxWidth:'700px',margin:'0 auto'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px',flexWrap:'wrap',gap:'8px'}}>
      <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:'5px',color:'var(--bl)',fontWeight:600,background:'none',border:'none',cursor:'pointer',fontSize:'14px'}}><span style={{fontSize:'18px'}}>←</span> 목록으로</button>
      <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
        {[['📋 복사',()=>copyGD(note),'#eff6ff','#1e40af'],['🖨 인쇄',()=>printN(note),'#f0fdf4','#166534'],['✏️ 수정',()=>onEdit(note),'var(--cd)','var(--wt)'],['🗑 삭제',()=>{if(confirm('삭제?'))onDelete(note.id);},'#fef2f2','#dc2626']].map(([l,fn,bg,c])=><button key={l} onClick={fn} style={{background:bg,color:c,borderRadius:'8px',padding:'7px 13px',fontSize:'13px',fontWeight:600,border:'none',cursor:'pointer'}}>{l}</button>)}
      </div>
    </div>
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{background:'linear-gradient(135deg,var(--bd),var(--bm))',padding:'22px',color:'#fff'}}>
        <div style={{fontSize:'13px',opacity:.75,marginBottom:'4px'}}>{fD(note.date)}{note.church&&` · ${note.church}`}</div>
        <h1 style={{fontSize:'22px',fontWeight:800,marginBottom:'8px'}}>{note.title}</h1>
        {scrs.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'6px'}}>
          {scrs.map(s=><span key={s} style={{background:'rgba(255,255,255,.2)',fontSize:'13px',padding:'3px 10px',borderRadius:'7px',color:'#fde68a',fontWeight:600}}>📜 {s}</span>)}
        </div>}
        {vid&&<div style={{marginTop:'6px',fontSize:'12px',opacity:.7}}>▶ 설교 영상 있음</div>}
        <div style={{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'8px'}}>
          {(note.tags||[]).map(t=><span key={t} style={{background:'rgba(255,255,255,.2)',color:'#fff',fontSize:'12px',borderRadius:'9999px',padding:'2px 9px'}}>#{t}</span>)}
        </div>
      </div>
      <div style={{display:'flex',overflowX:'auto',borderBottom:'1px solid var(--wb)',background:'var(--cr)'}}>
        {Tab('content','📝 내용')}
        {Tab('verses',`📜 구절${note.verses?.length?` (${note.verses.length})`:''}`)}
        {Tab('xref',`🔗 교차인용${linked.length?` (${linked.length})`:''}`)}
        {Tab('comments',`💬 댓글${note.comments?.length?` (${note.comments.length})`:''}`)}
      </div>
      <div style={{padding:'22px'}}>
        {tab==='content'&&<div>
          {/* YouTube 영상 */}
          {vid&&<div style={{marginBottom:'18px'}}>
            <div style={{fontSize:'12px',fontWeight:700,color:'#7b3f00',textTransform:'uppercase',marginBottom:'8px'}}>설교 영상</div>
            <div style={{position:'relative',paddingBottom:'56.25%',height:0,borderRadius:'12px',overflow:'hidden'}}>

            </div>
          </div>}
          {note.summary&&<div style={{marginBottom:'16px'}}>
            <div style={{fontSize:'12px',fontWeight:700,color:'#7b3f00',textTransform:'uppercase',marginBottom:'6px'}}>핵심 요약</div>

            {note.verses.map((v,i)=><VerseItem key={v.id||i} v={v} size="detail"/>)}
          </div>:
          <div style={{textAlign:'center',padding:'32px',color:'#b08060',fontSize:'14px'}}>인용 구절이 없습니다.</div>
        )}
        {tab==='xref'&&<CrossRefMap note={note} all={all}/>}
        {tab==='comments'&&<div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'16px'}}>
            {!note.comments?.length&&<div style={{textAlign:'center',padding:'24px',color:'#b08060',fontSize:'14px'}}>첫 번째 댓글을 남겨보세요!</div>}
            {(note.comments||[]).map(c=><div key={c.id} style={{background:'var(--cr)',border:'1px solid var(--wb)',borderRadius:'10px',padding:'12px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
                <span style={{fontWeight:700,fontSize:'14px'}}>{c.author}</span>
                <span style={{fontSize:'12px',color:'#9a7a60'}}>{fT(c.ts||c.timestamp)}</span>
              </div>
              <div style={{fontSize:'14px',lineHeight:1.8}}>{c.text}</div>
            </div>)}
          </div>
          <div style={{borderTop:'1px solid var(--wb)',paddingTop:'14px'}}>
            <input value={auth} onChange={e=>setAuth(e.target.value)} placeholder="이름 (선택사항)" style={{marginBottom:'7px'}}/>
            <div style={{display:'flex',gap:'7px'}}>
              <textarea value={cmt} onChange={e=>setCmt(e.target.value)} placeholder="댓글 입력..." rows={2} style={{flex:1,resize:'none',fontSize:'14px'}}/>
              <button onClick={submitCmt} className="bp" style={{padding:'8px 14px',borderRadius:'10px'}}>전송</button>
            </div>
          </div>
        </div>}
      </div>
    </div>
  </div>;
}

      <span>📖 {note.verses?.length||0}구절</span>
      {linked.length>0&&<span style={{color:'var(--am)',fontWeight:600}}>🔗 {linked.length}개 연결</span>}
    </div>
  </div>;
}

   content:'▶ 핵심 메시지\n하나님의 사랑은 조건 없는 사랑입니다.\n\n[요한복음 3:16] — 독생자를 주실 만큼 크신 사랑\n[로마서 5:8] — 우리가 죄인이었을 때에도 사랑하신 하나님\n\n▶ 적용\n이 사랑을 받은 자로서 이웃을 사랑하는 삶을 살겠습니다.',
   tags:['사랑','구원','영생'],
   verses:[{id:'v1',ref:'John 3:16',text:'For God so loved the world, that he gave his only begotten Son...',koText:'하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니 이는 그를 믿는 자마다 멸망하지 않고 영생을 얻게 하려 하심이라.'}],
   likes:5,views:12,comments:[{id:'c1',author:'성도1',text:'은혜로운 말씀 감사합니다!',ts:'2026-04-05T10:00:00Z'}]},
  {id:'s2',title:'믿음으로 사는 삶',date:'2026-04-01',church:'부산제일교회',mainScripture:'히브리서 11:1',
   summary:'믿음은 바라는 것들의 실상이요 보이지 않는 것들의 증거니.',
   content:'히브리서 11장 묵상.',tags:['믿음','히브리서'],
   verses:[{id:'v2',ref:'Hebrews 11:1',text:'Now faith is the substance of things hoped for...',koText:'믿음은 바라는 것들의 실상이요 보이지 않는 것들의 증거니'}],
   likes:3,views:8,comments:[]}
];

// ── 메인 App ──
function App(){
  const [notes,setNotes]=useState([]);
  const [view,setView]=useState('list');
  const [sel,setSel]=useState(null);const [editT,setEditT]=useState(null);
  const [q,setQ]=useState('');const [svr,setSvr]=useState(null);const [ld,setLd]=useState(true);
  const [expOpen,setExpOpen]=useState(false);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [dfltChurch,setDfltChurch]=useState('부산제일교회');
  const [churchInput,setChurchInput]=useState('부산제일교회');

  useEffect(()=>{
    fetch(API+'/health').then(r=>r.ok?setSvr(true):setSvr(false)).catch(()=>setSvr(false));
    setLd(true);apiG('/notes').then(d=>setNotes(d)).catch(()=>setNotes(INIT)).finally(()=>setLd(false));
    // 설정 불러오기
    apiG('/settings').then(s=>{if(s.defaultChurch){setDfltChurch(s.defaultChurch);setChurchInput(s.defaultChurch);}}).catch(()=>{});
  },[]);

  const saveSettings=async()=>{
    const val=churchInput.trim()||'부산제일교회';
    setDfltChurch(val);
    try{await fetch(API+'/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({defaultChurch:val})});}catch{}
    setSettingsOpen(false);
  };

  const saveNote=async form=>{
    try{
      if(editT){const u=await apiU(`/notes/${editT.id}`,form);setNotes(ns=>ns.map(n=>n.id===editT.id?u:n));}
      else{const c=await apiP('/notes',{...form,id:uid(),likes:0,views:0,comments:[]});setNotes(ns=>[c,...ns]);}
    }catch{
      if(editT)setNotes(ns=>ns.map(n=>n.id===editT.id?{...n,...form}:n));
      else setNotes(ns=>[{...form,id:uid(),likes:0,views:0,comments:[]},...ns]);
    }
    setView('list');setEditT(null);
  };
  const delNote=async id=>{try{await apiD(`/notes/${id}`);}catch{}setNotes(ns=>ns.filter(n=>n.id!==id));setView('list');setSel(null);};
  const likeNote=async id=>{
    try{const u=await apiP(`/notes/${id}/like`,{});setNotes(ns=>ns.map(n=>n.id===id?{...n,likes:u.likes}:n));}
    catch{setNotes(ns=>ns.map(n=>n.id===id?{...n,likes:(n.likes||0)+1}:n));}
  };
  const addCmt=async(id,c)=>{
    try{const u=await apiP(`/notes/${id}/comments`,c);setNotes(ns=>ns.map(n=>n.id===id?u:n));}
    catch{setNotes(ns=>ns.map(n=>n.id===id?{...n,comments:[...(n.comments||[]),{...c,id:uid()}]}:n));}
  };
  const openNote=n=>{
    const u={...n,views:(n.views||0)+1};setSel(u);setNotes(ns=>ns.map(x=>x.id===n.id?u:x));
    apiU(`/notes/${n.id}`,u).catch(()=>{});setView('detail');
  };

  const filtered=notes.filter(n=>{
    if(!q.trim())return true;const s=q.toLowerCase();
    return[n.title,n.content,n.mainScripture,n.summary,n.church,...(n.tags||[])].some(x=>x?.toLowerCase().includes(s));
  });

  const dlExcel=()=>{
    if(svr){window.location.href=API+'/export/excel';}
    else{alert('Excel 내보내기는 서버 연결 시 사용 가능합니다.\n현재 오프라인 모드에서는 CSV로 내보내기 하세요.');}
  };

  return<div style={{minHeight:'100vh',background:'var(--cr)'}}>
    <header className="np" style={{background:'#7C4A28',position:'sticky',top:0,zIndex:50,boxShadow:'0 2px 8px rgba(0,0,0,.25)'}}>
      <div style={{maxWidth:'900px',margin:'0 auto',padding:'11px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:'9px',cursor:'pointer'}} onClick={()=>{setView('list');setSel(null);setEditT(null);}}>
          <div style={{width:'34px',height:'34px',background:'rgba(255,255,255,.2)',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}}>📖</div>
          <div>
            <div style={{fontWeight:800,color:'#fff',fontSize:'15px'}}>말씀 노트</div>
            <div style={{fontSize:'10px',color:'rgba(255,255,255,.65)',display:'flex',alignItems:'center'}}>
              <span style={{display:'inline-block',width:'6px',height:'6px',borderRadius:'50%',background:svr===true?'#4ade80':svr===false?'#f87171':'#fbbf24',marginRight:'4px'}}></span>
              {svr===true?'서버 연결됨':svr===false?'오프라인 모드':'연결 확인 중'}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:'7px'}}>
          <button onClick={()=>{setChurchInput(dfltChurch);setSettingsOpen(true);}} style={{color:'rgba(255,255,255,.7)',fontSize:'13px',padding:'7px 10px',borderRadius:'8px',background:'rgba(255,255,255,.12)',border:'none',cursor:'pointer'}} title="설정">⚙️</button>
          {view==='list'&&<><button onClick={()=>setExpOpen(true)} style={{color:'rgba(255,255,255,.8)',fontSize:'13px',fontWeight:600,padding:'7px 12px',borderRadius:'8px',background:'rgba(255,255,255,.15)',border:'none',cursor:'pointer'}}>📤 내보내기</button>
          <button onClick={()=>{setEditT(null);setView('editor');}} style={{background:'var(--am)',color:'#fff',fontWeight:700,padding:'8px 15px',borderRadius:'9px',fontSize:'13px',border:'none',cursor:'pointer'}}>+ 새 노트</button></>}
        </div>
      </div>
    </header>

    <main style={{maxWidth:'900px',margin:'0 auto',padding:'18px 14px'}}>
      {view==='list'&&<div className="fade">
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 제목, 본문구절, 태그, 내용으로 검색..." style={{marginBottom:'16px',fontSize:'15px'}}/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'16px'}}>
          {[['📚','전체 노트',notes.length],['📜','인용 구절',notes.reduce((s,n)=>s+(n.verses?.length||0),0)],['🔗','교차 인용',notes.filter(n=>xref(n,notes).length>0).length]].map(([ic,lb,v])=>(
            <div key={lb} style={{background:'#fff',borderRadius:'12px',border:'1px solid var(--wb)',padding:'14px 8px',textAlign:'center'}}>
              <div style={{fontSize:'24px',marginBottom:'4px'}}>{ic}</div>
              <div style={{fontSize:'22px',fontWeight:800,color:'var(--bm)'}}>{v}</div>
              <div style={{fontSize:'13px',color:'#9a7a60'}}>{lb}</div>
            </div>
          ))}
        </div>
        {ld?<div style={{textAlign:'center',padding:'60px',color:'var(--am)',fontSize:'15px'}}>
          <div style={{fontSize:'38px',marginBottom:'10px'}}>📖</div>불러오는 중...
        </div>:filtered.length===0?<div style={{textAlign:'center',padding:'60px',color:'#b08060'}}>
          <div style={{fontSize:'44px',marginBottom:'12px'}}>{q?'🔍':'📝'}</div>
          <div style={{fontSize:'17px',fontWeight:700,marginBottom:'6px'}}>{q?'검색 결과 없음':'아직 노트가 없습니다'}</div>
          <div style={{fontSize:'14px',marginBottom:'22px'}}>{q?'다른 키워드로 검색해보세요':'첫 번째 말씀 노트를 작성해보세요!'}</div>
          {!q&&<button onClick={()=>{setEditT(null);setView('editor');}} className="bp" style={{padding:'12px 28px',borderRadius:'12px',fontSize:'15px'}}>+ 첫 노트 작성하기</button>}
        </div>:(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'13px'}}>
            {filtered.map(n=><NoteCard key={n.id} note={n} all={notes} onClick={()=>openNote(n)}/>)}
          </div>
        )}
      </div>}

      {view==='editor'&&<NoteEditor initial={editT} onSave={saveNote} onCancel={()=>{setView(sel&&editT?'detail':'list');setEditT(null);}} dfltChurch={dfltChurch}/>}
      {view==='detail'&&sel&&<NoteDetail
        note={notes.find(n=>n.id===sel.id)||sel} all={notes}
        onEdit={n=>{setEditT(n);setView('editor');}}
        onClose={()=>{setView('list');setSel(null);}}
        onLike={likeNote} onComment={addCmt} onDelete={delNote}/>}
    </main>

    {/* 설정 모달 */}
    {settingsOpen&&<div className="mo" onClick={()=>setSettingsOpen(false)}>
      <div className="mb" style={{maxWidth:'400px'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
          <h3 style={{fontSize:'17px',fontWeight:800,color:'var(--bd)'}}>⚙️ 설정</h3>
          <button onClick={()=>setSettingsOpen(false)} style={{fontSize:'22px',color:'#9a7a60',background:'none',border:'none',cursor:'pointer'}}>×</button>
        </div>
        <div style={{marginBottom:'16px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:700,color:'var(--bm)',marginBottom:'6px'}}>기본 교회명</label>
          <input value={churchInput} onChange={e=>setChurchInput(e.target.value)} placeholder="부산제일교회" style={{fontSize:'15px'}}/>
          <div style={{fontSize:'12px',color:'#9a7a60',marginTop:'5px'}}>새 노트 작성 시 자동으로 입력됩니다. 개별 노트에서 수정 가능합니다.</div>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={saveSettings} className="bp" style={{flex:1,padding:'11px'}}>저장</button>
          <button onClick={()=>setSettingsOpen(false)} className="bg" style={{padding:'11px 18px'}}>취소</button>
        </div>
      </div>
    </div>}

    {expOpen&&<div className="mo" onClick={()=>setExpOpen(false)}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
          <h3 style={{fontSize:'17px',fontWeight:800,color:'var(--bd)'}}>📤 내보내기</h3>
          <button onClick={()=>setExpOpen(false)} style={{fontSize:'24px',color:'#9a7a60',background:'none',border:'none',cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {/* Excel */}
          <button onClick={()=>{dlExcel();setExpOpen(false);}} style={{background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:'12px',padding:'14px',textAlign:'left',cursor:'pointer'}}>
            <div style={{fontWeight:700,color:'#166534',fontSize:'15px'}}>📊 Excel (.xlsx) 내보내기</div>
            <div style={{fontSize:'13px',color:'#15803d',marginTop:'4px'}}>색상·칸 꾸밈 포함, 성경책별 필터링 가능 (서버 필요)</div>
          </button>
          {/* CSV */}
          <button onClick={()=>{dlCSV(notes);setExpOpen(false);}} style={{background:'#f0fdf4',border:'2px solid #d1fae5',borderRadius:'12px',padding:'13px',textAlign:'left',cursor:'pointer'}}>
            <div style={{fontWeight:700,color:'#166534',fontSize:'14px'}}>📄 CSV 내보내기 (오프라인도 가능)</div>
          </button>
          {/* Google Docs */}
          <div style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'12px',padding:'13px'}}>
            <div style={{fontWeight:700,color:'#1e40af',fontSize:'15px',marginBottom:'3px'}}>📋 Google Docs 복사</div>
            <div style={{fontSize:'13px',color:'#1d4ed8',marginBottom:'8px'}}>복사 후 Google Docs에 Ctrl+V</div>
            <div style={{maxHeight:'130px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'5px'}}>
              {notes.map(n=><button key={n.id} onClick={()=>{copyGD(n);setExpOpen(false);}} style={{textAlign:'left',background:'#fff',border:'1px solid #bfdbfe',borderRadius:'7px',padding:'7px 11px',cursor:'pointer',fontSize:'13px',color:'#1e40af'}}>📄 {n.title}</button>)}
            </div>
          </div>
          {/* 인쇄 */}
          <div style={{background:'#fffbeb',border:'2px solid #fde68a',borderRadius:'12px',padding:'13px'}}>
            <div style={{fontWeight:700,color:'#7b3f00',fontSize:'15px',marginBottom:'6px'}}>🖨 인쇄</div>
            <div style={{maxHeight:'130px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'5px'}}>
              {notes.map(n=><button key={n.id} onClick={()=>{printN(n);setExpOpen(false);}} style={{textAlign:'left',background:'#fff',border:'1px solid #fde68a',borderRadius:'7px',padding:'7px 11px',cursor:'pointer',fontSize:'13px',color:'#7b3f00'}}>🖨 {n.title}</button>)}
            </div>
          </div>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
